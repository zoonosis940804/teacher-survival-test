<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍎 초등교사 생존력 테스트 센터</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --bg-deep: #080f1f;
  --bg-card: rgba(13,24,41,0.75);
  --glass-border: rgba(100,160,255,0.16);
  --mint: #50f0c0;
  --sky: #60b0f4;
  --lavender: #b090d8;
  --peach: #ff9878;
  --gold: #ffd040;
  --rose: #ff7eb3;
  --text-white: #e8f0f8;
  --text-dim: rgba(232,240,248,0.45);
  --text-mid: rgba(232,240,248,0.75);
  --radius: 20px;
  --radius-sm: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  background: var(--bg-deep);
  color: var(--text-white);
  overflow-x: hidden;
}
.ambient { position:fixed; inset:0; z-index:0; pointer-events:none; }
.orb { position:absolute; border-radius:50%; filter:blur(130px); opacity:0.09; }
.orb1 { width:600px; height:600px; background:var(--sky); top:-15%; right:-10%; animation:orbA 22s ease-in-out infinite; }
.orb2 { width:500px; height:500px; background:var(--mint); bottom:-15%; left:-10%; animation:orbB 26s ease-in-out infinite; }
.orb3 { width:350px; height:350px; background:var(--lavender); top:40%; left:40%; animation:orbC 18s ease-in-out infinite; opacity:0.06; }
@keyframes orbA { 0%,100%{transform:translate(0,0)} 33%{transform:translate(-10vw,15vh)} 66%{transform:translate(-5vw,6vh)} }
@keyframes orbB { 0%,100%{transform:translate(0,0)} 33%{transform:translate(12vw,-10vh)} 66%{transform:translate(6vw,-4vh)} }
@keyframes orbC { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(5vw,-8vh) scale(1.2)} }
.grid-bg {
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image: linear-gradient(rgba(80,160,255,0.035) 1px,transparent 1px),linear-gradient(90deg,rgba(80,160,255,0.035) 1px,transparent 1px);
  background-size:44px 44px;
}
.deco { position:fixed; font-size:28px; opacity:0.055; pointer-events:none; z-index:0; animation:decoFloat 15s ease-in-out infinite; }
@keyframes decoFloat { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-18px) rotate(8deg)} }
.wrapper { position:relative; z-index:1; max-width:1100px; margin:0 auto; padding:0 20px 80px; }

/* ── Hero ── */
.hero { text-align:center; padding:64px 20px 40px; }
.hero-badge {
  display:inline-flex; align-items:center; gap:8px;
  padding:6px 18px; border-radius:30px;
  background:rgba(96,176,244,0.1); border:1px solid rgba(96,176,244,0.25);
  color:var(--sky); font-size:0.78rem; font-weight:700; margin-bottom:20px; letter-spacing:0.5px;
}
.hero h1 { font-family:'Gaegu',cursive; font-size:clamp(2rem,5vw,3.2rem); font-weight:700; line-height:1.25; margin-bottom:14px; }
.hero h1 .hl { background:linear-gradient(90deg,var(--sky),var(--mint)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.hero .sub { font-size:1rem; color:var(--text-mid); line-height:1.75; max-width:560px; margin:0 auto 32px; }
.stat-row { display:flex; justify-content:center; gap:16px; flex-wrap:wrap; margin-bottom:52px; }
.stat-pill {
  display:flex; align-items:center; gap:8px; padding:10px 20px; border-radius:50px;
  background:var(--bg-card); backdrop-filter:blur(16px); border:1px solid var(--glass-border);
  font-size:0.88rem; font-weight:700; color:var(--text-mid);
}
.stat-pill i { color:var(--mint); font-size:0.85rem; }
.stat-pill .val { color:var(--text-white); }

/* ── Section Label ── */
.section-label { display:flex; align-items:center; gap:10px; margin-bottom:22px; }
.section-label h2 { font-family:'Gaegu',cursive; font-size:1.3rem; font-weight:700; color:var(--text-white); }
.section-divider { flex:1; height:1px; background:linear-gradient(90deg,rgba(96,176,244,0.3),transparent); }

/* ── Cards Grid ── */
.cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:18px; }

/* ── Test Card ── */
.test-card {
  background:var(--bg-card); backdrop-filter:blur(18px);
  border:1px solid var(--glass-border); border-radius:var(--radius);
  padding:28px 24px 24px; cursor:pointer;
  transition:transform 0.28s cubic-bezier(.23,1,.32,1),box-shadow 0.28s,border-color 0.28s;
  animation:cardIn 0.5s cubic-bezier(.23,1,.32,1) both;
  text-decoration:none; display:flex; flex-direction:column; gap:14px;
  position:relative; overflow:hidden;
}
.test-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg,var(--card-a,var(--sky)),var(--card-b,var(--mint)));
  border-radius:var(--radius) var(--radius) 0 0; opacity:0; transition:opacity 0.28s;
}
.test-card:hover { transform:translateY(-5px); box-shadow:0 16px 48px rgba(0,0,0,0.4); border-color:rgba(96,176,244,0.3); }
.test-card:hover::before { opacity:1; }
.test-card:active { transform:scale(0.97); }
@keyframes cardIn { from{opacity:0;transform:translateY(24px) scale(0.96)} to{opacity:1;transform:translateY(0) scale(1)} }
.card-top { display:flex; align-items:flex-start; justify-content:space-between; }
.card-icon-wrap {
  width:54px; height:54px; border-radius:16px; display:flex; align-items:center; justify-content:center;
  font-size:28px; transition:transform 0.3s; flex-shrink:0;
}
.test-card:hover .card-icon-wrap { transform:scale(1.12) rotate(6deg); }
.card-num-badge { padding:5px 12px; border-radius:20px; font-size:0.72rem; font-weight:700; letter-spacing:0.5px; }
.card-title { font-family:'Gaegu',cursive; font-size:1.15rem; font-weight:700; color:var(--text-white); line-height:1.4; word-break:keep-all; flex:1; }
.card-desc { font-size:0.82rem; color:var(--text-dim); line-height:1.65; word-break:keep-all; flex:1; }
.card-footer { display:flex; align-items:center; justify-content:space-between; margin-top:auto; }
.card-tags { display:flex; gap:6px; flex-wrap:wrap; }
.tag { padding:3px 10px; border-radius:10px; font-size:0.68rem; font-weight:700; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); color:var(--text-dim); }
.card-arrow {
  width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  color:var(--bg-deep); font-size:0.8rem; flex-shrink:0; transition:transform 0.25s;
  box-shadow:0 4px 14px rgba(96,176,244,0.25);
}
.test-card:hover .card-arrow { transform:translateX(3px); }

/* ── Loading ── */
.loading-section { display:flex; flex-direction:column; align-items:center; gap:16px; padding:48px 0; }
.loading-bar-wrap { width:280px; height:6px; background:rgba(255,255,255,0.06); border-radius:6px; overflow:hidden; }
.loading-bar { height:100%; background:linear-gradient(90deg,var(--sky),var(--mint)); border-radius:6px; animation:loadScan 1.8s ease-in-out infinite; }
@keyframes loadScan { 0%{width:0;margin-left:0} 50%{width:60%;margin-left:20%} 100%{width:0;margin-left:100%} }
.loading-text { font-size:0.88rem; color:var(--text-dim); font-family:'Gaegu',cursive; animation:blink 1.4s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── Empty ── */
.empty-section {
  text-align:center; padding:60px 24px;
  background:var(--bg-card); backdrop-filter:blur(16px);
  border:1px dashed var(--glass-border); border-radius:var(--radius);
}
.empty-emoji { font-size:56px; margin-bottom:16px; display:block; animation:heroFloat 2.5s ease-in-out infinite; }
@keyframes heroFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
.empty-section h3 { font-family:'Gaegu',cursive; font-size:1.4rem; margin-bottom:8px; }
.empty-section p { color:var(--text-dim); font-size:0.88rem; line-height:1.7; }

/* ── Footer ── */
footer { margin-top:64px; text-align:center; padding:28px 0 12px; border-top:1px solid rgba(96,176,244,0.08); }
footer p { font-size:0.78rem; color:var(--text-dim); line-height:1.8; }
footer .heart { color:var(--rose); }

/* ── Responsive ── */
@media (max-width:640px) {
  .hero { padding:44px 12px 28px; }
  .hero h1 { font-size:1.75rem; }
  .cards-grid { grid-template-columns:1fr; }
  .stat-row { gap:10px; }
  .stat-pill { font-size:0.8rem; padding:8px 14px; }
}
</style>
</head>
<body>

<div class="ambient">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>
<div class="grid-bg"></div>

<div class="deco" style="top:6%;left:5%;animation-delay:0s;">🍎</div>
<div class="deco" style="top:18%;right:4%;animation-delay:2s;">📝</div>
<div class="deco" style="top:45%;left:2%;animation-delay:4s;">📂</div>
<div class="deco" style="top:65%;right:3%;animation-delay:6s;">💻</div>
<div class="deco" style="top:38%;right:1%;animation-delay:1s;">✏️</div>
<div class="deco" style="bottom:12%;left:7%;animation-delay:3s;">☕</div>
<div class="deco" style="bottom:20%;right:8%;animation-delay:5s;">🎒</div>

<div class="wrapper">

  <section class="hero">
    <div class="hero-badge">
      <i class="fas fa-school" style="font-size:0.8rem;"></i>
      초등교사 생존력 테스트 센터
    </div>
    <h1>나는 교실에서<br><span class="hl">어떤 선생님</span>일까? 🤔</h1>
    <p class="sub">
      나이스 꺾기부터 학기말 생존까지—<br>
      대한민국 초등 교사들의 공감 100% 테스트 모음집이에요.<br>
      <strong style="color:var(--sky);">결과 공유는 필수,</strong> 멘탈 관리는 선택이에요. 😅
    </p>
    <div class="stat-row">
      <div class="stat-pill"><i class="fas fa-list-check"></i> 시리즈 <span class="val" id="statTotal">탐색 중...</span></div>
    </div>
  </section>

  <section>
    <div class="section-label">
      <h2>📚 테스트 목록</h2>
      <div class="section-divider"></div>
    </div>
    <div class="loading-section" id="loadingSection">
      <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
      <p class="loading-text">🔍 테스트 파일 탐색 중... (최대 30개)</p>
    </div>
    <div class="cards-grid" id="cardsGrid" style="display:none;"></div>
    <div class="empty-section" id="emptySection" style="display:none;">
      <span class="empty-emoji">📭</span>
      <h3>아직 등록된 테스트가 없어요!</h3>
      <p>곧 새로운 테스트가 올라올 예정이에요. 조금만 기다려주세요. ✨</p>
    </div>
  </section>


  <footer>
    <p>
      <span class="heart">♥</span> 선생님들의 퇴근 후 5분을 책임지는 힐링 테스트 시리즈
    </p>
  </footer>

</div>

<script>
const TEST_META = {
  1: {
    title: "초등교사 MBTI",
    desc: "학교 안의 나는 ESTJ? INFP? 교실 상황으로 나만의 교사 MBTI를 분석해보세요!",
    emoji: "🧠",
    tags: ["MBTI", "성격유형"],
    colorA: "#60b0f4", colorB: "#50f0c0"
  },
  2: {
    title: "교사 생존 능력치",
    desc: "나이스 처리 속도, 공문 이해력, 학부모 상대 내성... 당신의 생존 스탯은 몇 점?",
    emoji: "⚔️",
    tags: ["능력치", "스탯"],
    colorA: "#ffd040", colorB: "#ff9878"
  },
  3: {
    title: "학교 업무 캐릭터 도감",
    desc: "정보통부터 해탈 고수까지! 12가지 업무 상황 속 나는 어떤 캐릭터인지 확인해보세요.",
    emoji: "📂",
    tags: ["업무유형", "캐릭터"],
    colorA: "#b090d8", colorB: "#ff7eb3"
  }
};

/* 메타 미등록 시 순환 사용하는 기본 테마 */
const DEFAULT_THEMES = [
  { emoji:"🍎", colorA:"#60b0f4", colorB:"#50f0c0" },
  { emoji:"📝", colorA:"#ffd040", colorB:"#ff9878" },
  { emoji:"🎯", colorA:"#b090d8", colorB:"#ff7eb3" },
  { emoji:"💡", colorA:"#50f0c0", colorB:"#60b0f4" },
  { emoji:"🏆", colorA:"#ff9878", colorB:"#ffd040" },
  { emoji:"🌱", colorA:"#60d890", colorB:"#50f0c0" },
  { emoji:"⚡", colorA:"#ffd040", colorB:"#b090d8" },
  { emoji:"🔮", colorA:"#b090d8", colorB:"#60b0f4" },
  { emoji:"🎨", colorA:"#ff7eb3", colorB:"#ffd040" },
  { emoji:"🚀", colorA:"#60b0f4", colorB:"#b090d8" },
];

const MAX_SCAN = 30;
const STOP_ON_MISS = 3;

function parseTitleFromHtml(html) {
  const m = html.match(/<title[^>]*>([\s\S]*?)<\/title>/i);
  if (!m) return null;
  return m[1].replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').trim();
}

function extractLeadingEmoji(str) {
  if (!str) return null;
  const m = str.match(/^(\p{Emoji_Presentation}|\p{Extended_Pictographic})/u);
  return m ? m[0] : null;
}

function stripLeadingEmoji(str) {
  if (!str) return str;
  return str.replace(/^(\p{Emoji_Presentation}|\p{Extended_Pictographic})\s*/u, '').trim();
}

async function scanTests() {
  const found = [];
  let missCount = 0;

  for (let i = 1; i <= MAX_SCAN; i++) {
    if (missCount >= STOP_ON_MISS) break;
    try {
      const res = await fetch('test' + i + '.html');
      if (res.ok) {
        const html = await res.text();
        const rawTitle = parseTitleFromHtml(html);
        found.push({ num: i, rawTitle: rawTitle });
        missCount = 0;
      } else {
        missCount++;
      }
    } catch(e) {
      missCount++;
    }
  }
  return found;
}

function createCard(item, delay) {
  const num = item.num;
  const rawTitle = item.rawTitle;
  const meta = TEST_META[num];
  const theme = DEFAULT_THEMES[(num - 1) % DEFAULT_THEMES.length];

  const emojiFromTitle = extractLeadingEmoji(rawTitle);
  const emoji   = (meta && meta.emoji)  || emojiFromTitle || theme.emoji;

  const titleFromFile = rawTitle ? stripLeadingEmoji(rawTitle) : null;
  const title   = (meta && meta.title)  || titleFromFile || ('테스트 ' + num + '탄');

  const desc    = (meta && meta.desc)   || ('시리즈 ' + num + '탄에 도전해보세요! 당신의 교실 속 모습을 분석해드립니다.');
  const tags    = (meta && meta.tags)   || [num + '탄'];
  const colorA  = (meta && meta.colorA) || theme.colorA;
  const colorB  = (meta && meta.colorB) || theme.colorB;

  const card = document.createElement('a');
  card.href = 'test' + num + '.html';
  card.className = 'test-card';
  card.style.cssText += '--card-a:' + colorA + ';--card-b:' + colorB + ';animation-delay:' + (delay * 0.08) + 's;';

  const tagsHTML = tags.map(function(t){ return '<span class="tag">' + t + '</span>'; }).join('');

  card.innerHTML =
    '<div class="card-top">' +
      '<div class="card-icon-wrap" style="background:' + colorA + '18;border:1px solid ' + colorA + '30;">' + emoji + '</div>' +
      '<div class="card-num-badge" style="background:' + colorA + '14;border:1px solid ' + colorA + '30;color:' + colorB + ';">시리즈 ' + num + '탄</div>' +
    '</div>' +
    '<div class="card-title">' + title + '</div>' +
    '<div class="card-desc">' + desc + '</div>' +
    '<div class="card-footer">' +
      '<div class="card-tags">' + tagsHTML + '</div>' +
      '<div class="card-arrow" style="background:linear-gradient(135deg,' + colorA + ',' + colorB + ');">' +
        '<i class="fas fa-arrow-right"></i>' +
      '</div>' +
    '</div>';

  return card;
}

async function init() {
  const loadingSection = document.getElementById('loadingSection');
  const cardsGrid = document.getElementById('cardsGrid');
  const emptySection = document.getElementById('emptySection');
  const statTotal = document.getElementById('statTotal');

  try {
    const found = await scanTests();
    loadingSection.style.display = 'none';

    if (found.length === 0) {
      emptySection.style.display = 'block';
      statTotal.textContent = '0개';
    } else {
      cardsGrid.style.display = 'grid';
      statTotal.textContent = found.length + '개 발견';
      found.forEach(function(item, idx) {
        cardsGrid.appendChild(createCard(item, idx));
      });
    }
  } catch(err) {
    loadingSection.style.display = 'none';
    emptySection.style.display = 'block';
    emptySection.querySelector('h3').textContent = '탐색 중 오류가 발생했어요';
    emptySection.querySelector('p').innerHTML =
      '파일을 같은 폴더에 저장한 뒤 다시 시도해주세요.<br>' +
      '<small style="color:rgba(232,240,248,0.35);">' + err.message + '</small>';
    statTotal.textContent = '오류';
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
