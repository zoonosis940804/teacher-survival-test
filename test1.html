<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏫 나에게 맞는 운명의 학년 찾기</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --bg-gradient-1: #fbc2eb;
  --bg-gradient-2: #a6c1ee;
  --bg-gradient-3: #ffecd2;
  --glass-bg: rgba(255,255,255,0.28);
  --glass-border: rgba(255,255,255,0.5);
  --glass-shadow: rgba(31,38,135,0.12);
  --text-dark: #2d3436;
  --text-medium: #555;
  --text-light: #999;
  --accent-pink: #fd79a8;
  --accent-purple: #a29bfe;
  --accent-blue: #74b9ff;
  --radius: 22px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  background: linear-gradient(135deg, var(--bg-gradient-1) 0%, var(--bg-gradient-2) 50%, var(--bg-gradient-3) 100%);
  background-attachment: fixed;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 20px;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background:
    radial-gradient(circle at 20% 50%, rgba(253,121,168,0.12) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(116,185,255,0.12) 0%, transparent 50%),
    radial-gradient(circle at 50% 80%, rgba(162,155,254,0.12) 0%, transparent 50%);
  animation: bgFloat 20s ease-in-out infinite;
  z-index: 0;
  pointer-events: none;
}

@keyframes bgFloat {
  0%,100% { transform: translate(0,0) rotate(0deg); }
  33% { transform: translate(2%,-2%) rotate(1deg); }
  66% { transform: translate(-1%,1%) rotate(-1deg); }
}

/* ── Sound Toggle ── */
.sound-toggle {
  position: fixed;
  top: 18px;
  left: 18px;
  z-index: 500;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 1.5px solid var(--glass-border);
  background: rgba(255,255,255,0.35);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  box-shadow: 0 4px 16px var(--glass-shadow);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  transition: all 0.3s ease;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.sound-toggle:hover {
  transform: scale(1.1);
  background: rgba(255,255,255,0.5);
  box-shadow: 0 6px 24px rgba(162,155,254,0.25);
}

.sound-toggle:active {
  transform: scale(0.95);
}

.sound-toggle .icon-on,
.sound-toggle .icon-off {
  position: absolute;
  transition: opacity 0.25s, transform 0.25s;
}

.sound-toggle.muted .icon-on {
  opacity: 0;
  transform: scale(0.6);
}

.sound-toggle.muted .icon-off {
  opacity: 1;
  transform: scale(1);
}

.sound-toggle:not(.muted) .icon-on {
  opacity: 1;
  transform: scale(1);
}

.sound-toggle:not(.muted) .icon-off {
  opacity: 0;
  transform: scale(0.6);
}

.sound-tooltip {
  position: absolute;
  left: 56px;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(45,52,54,0.85);
  color: #fff;
  font-size: 0.72rem;
  font-weight: 500;
  padding: 5px 10px;
  border-radius: 8px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

.sound-toggle:hover .sound-tooltip {
  opacity: 1;
}

/* ── App Container ── */
.app-container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 700px;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 0 40px;
}

.glass-card {
  background: var(--glass-bg);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  box-shadow: 0 8px 32px var(--glass-shadow);
  padding: 40px 32px;
  width: 100%;
  animation: cardIn 0.6s cubic-bezier(.23,1,.32,1) both;
}

@keyframes cardIn {
  from { opacity:0; transform: translateY(30px) scale(0.97); }
  to { opacity:1; transform: translateY(0) scale(1); }
}

/* ── Start ── */
.start-screen { text-align: center; }

.start-screen .emoji-hero {
  font-size: 72px;
  margin-bottom: 14px;
  display: inline-block;
  animation: heroFloat 2.5s ease-in-out infinite;
}

@keyframes heroFloat {
  0%,100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-14px) rotate(3deg); }
}

.start-screen h1 {
  font-family: 'Gaegu', cursive;
  font-size: 2.4rem;
  font-weight: 700;
  color: var(--text-dark);
  line-height: 1.35;
  margin-bottom: 10px;
}

.start-screen .sub {
  font-size: 0.95rem;
  color: var(--text-medium);
  line-height: 1.7;
  margin-bottom: 32px;
}

.start-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 16px 52px;
  border: none;
  border-radius: 50px;
  background: linear-gradient(135deg, #fd79a8, #a29bfe);
  color: #fff;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 1.15rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 6px 24px rgba(253,121,168,0.35);
  position: relative;
  overflow: hidden;
}

.start-btn::after {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.2) 50%, transparent 70%);
  animation: shimmer 3s infinite;
}

@keyframes shimmer {
  0% { transform: translateX(-100%) rotate(25deg); }
  100% { transform: translateX(100%) rotate(25deg); }
}

.start-btn:hover {
  transform: translateY(-3px) scale(1.03);
  box-shadow: 0 12px 32px rgba(253,121,168,0.45);
}

/* ── Progress ── */
.progress-wrap { width: 100%; margin-bottom: 22px; }

.progress-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.progress-info .q-num {
  font-family: 'Gaegu', cursive;
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--text-dark);
}

.progress-info .q-count {
  font-size: 0.85rem;
  color: var(--text-light);
  font-weight: 500;
}

.progress-bar-bg {
  width: 100%;
  height: 10px;
  background: rgba(255,255,255,0.35);
  border-radius: 10px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #fd79a8, #a29bfe, #74b9ff);
  border-radius: 10px;
  transition: width 0.5s cubic-bezier(.23,1,.32,1);
}

/* ── Question ── */
.question-section { animation: fadeSlide 0.45s ease both; }

@keyframes fadeSlide {
  from { opacity: 0; transform: translateX(36px); }
  to { opacity: 1; transform: translateX(0); }
}

.question-text {
  font-size: 1.08rem;
  font-weight: 700;
  color: var(--text-dark);
  line-height: 1.7;
  margin-bottom: 24px;
  word-break: keep-all;
}

.question-text .q-emoji {
  display: inline-block;
  margin-right: 6px;
  font-size: 1.3rem;
}

/* ── Answers 2-col ── */
.answers-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.answer-btn {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 14px 15px;
  border: 1.5px solid rgba(255,255,255,0.45);
  border-radius: 16px;
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  cursor: pointer;
  transition: all 0.22s ease;
  text-align: left;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 0.84rem;
  color: var(--text-dark);
  line-height: 1.55;
  word-break: keep-all;
}

.answer-btn .num-badge {
  flex-shrink: 0;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.72rem;
  font-weight: 700;
  margin-top: 1px;
}

.answer-btn:hover {
  background: rgba(255,255,255,0.45);
  border-color: var(--accent-purple);
  transform: translateY(-2px);
  box-shadow: 0 4px 18px rgba(162,155,254,0.22);
}

.answer-btn:active { transform: scale(0.97); }

.answer-btn.picked {
  background: linear-gradient(135deg, rgba(162,155,254,0.28), rgba(116,185,255,0.28));
  border-color: var(--accent-purple);
  box-shadow: 0 4px 18px rgba(162,155,254,0.3);
  pointer-events: none;
}

/* ── Result ── */
.result-screen {
  text-align: center;
  animation: popIn 0.65s cubic-bezier(.23,1,.32,1) both;
}

@keyframes popIn {
  from { opacity:0; transform: scale(0.8) translateY(28px); }
  to { opacity:1; transform: scale(1) translateY(0); }
}

.res-emoji {
  font-size: 84px;
  display: inline-block;
  margin-bottom: 12px;
  animation: emojiDance 1.2s ease-in-out infinite;
}

@keyframes emojiDance {
  0%,100% { transform: scale(1) rotate(0deg); }
  25% { transform: scale(1.12) rotate(-6deg); }
  75% { transform: scale(1.12) rotate(6deg); }
}

.res-badge {
  display: inline-block;
  padding: 9px 32px;
  border-radius: 50px;
  font-family: 'Gaegu', cursive;
  font-size: 1.65rem;
  font-weight: 700;
  color: #fff;
  margin-bottom: 14px;
}

.res-badge.g1 { background: linear-gradient(135deg, #ff9a9e, #fecfef); }
.res-badge.g2 { background: linear-gradient(135deg, #c9b1ff, #fbc2eb); }
.res-badge.g3 { background: linear-gradient(135deg, #fbc2eb, #f6d365); }
.res-badge.g4 { background: linear-gradient(135deg, #84fab0, #8fd3f4); }
.res-badge.g5 { background: linear-gradient(135deg, #a6c0fe, #f68084); }
.res-badge.g6 { background: linear-gradient(135deg, #667eea, #764ba2); }

.res-title {
  font-family: 'Gaegu', cursive;
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--text-dark);
  margin-bottom: 8px;
}

.res-desc {
  font-size: 0.94rem;
  color: var(--text-medium);
  line-height: 1.85;
  margin-bottom: 30px;
  word-break: keep-all;
  padding: 0 6px;
}

/* Score Bars */
.score-section {
  margin-bottom: 30px;
  text-align: left;
}

.score-section h3 {
  font-size: 0.88rem;
  font-weight: 700;
  color: var(--text-dark);
  margin-bottom: 14px;
  text-align: center;
}

.score-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 9px;
}

.score-label {
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--text-dark);
  min-width: 52px;
  text-align: right;
}

.score-track {
  flex: 1;
  height: 16px;
  background: rgba(255,255,255,0.3);
  border-radius: 10px;
  overflow: hidden;
}

.score-fill {
  height: 100%;
  border-radius: 10px;
  transition: width 1.1s cubic-bezier(.23,1,.32,1);
  width: 0;
}

.sf1 { background: linear-gradient(90deg, #ff9a9e, #fecfef); }
.sf2 { background: linear-gradient(90deg, #c9b1ff, #fbc2eb); }
.sf3 { background: linear-gradient(90deg, #fbc2eb, #f6d365); }
.sf4 { background: linear-gradient(90deg, #84fab0, #8fd3f4); }
.sf5 { background: linear-gradient(90deg, #a6c0fe, #f68084); }
.sf6 { background: linear-gradient(90deg, #667eea, #764ba2); }

.score-pts {
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--text-light);
  min-width: 28px;
}

.retry-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 15px 44px;
  border: none;
  border-radius: 50px;
  background: linear-gradient(135deg, #74b9ff, #a29bfe);
  color: #fff;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 1.05rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 6px 22px rgba(116,185,255,0.35);
}

.retry-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 28px rgba(116,185,255,0.45);
}

/* ── Action Buttons Row ── */
.result-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

.save-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 15px 36px;
  border: none;
  border-radius: 50px;
  background: linear-gradient(135deg, #fd79a8, #e17055);
  color: #fff;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 1.05rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 6px 22px rgba(253,121,168,0.35);
}

.save-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 28px rgba(253,121,168,0.45);
}

.save-btn:active { transform: scale(0.97); }

.save-btn.saving {
  pointer-events: none;
  opacity: 0.7;
}

/* ── Hidden Capture Card ── */
.capture-card {
  position: fixed;
  left: -9999px;
  top: 0;
  width: 600px;
  padding: 48px 40px 40px;
  border-radius: 28px;
  font-family: 'Noto Sans KR', sans-serif;
  text-align: center;
  z-index: -1;
}

.capture-card .cap-watermark {
  font-size: 0.7rem;
  color: rgba(255,255,255,0.6);
  margin-top: 18px;
  letter-spacing: 1px;
}

.capture-card .cap-emoji { font-size: 72px; margin-bottom: 10px; }

.capture-card .cap-badge {
  display: inline-block;
  padding: 8px 30px;
  border-radius: 50px;
  font-family: 'Gaegu', cursive;
  font-size: 1.6rem;
  font-weight: 700;
  color: #fff;
  margin-bottom: 12px;
  background: rgba(255,255,255,0.25);
}

.capture-card .cap-title {
  font-family: 'Gaegu', cursive;
  font-size: 1.3rem;
  font-weight: 700;
  color: #fff;
  margin-bottom: 10px;
}

.capture-card .cap-desc {
  font-size: 0.88rem;
  color: rgba(255,255,255,0.88);
  line-height: 1.8;
  word-break: keep-all;
  margin-bottom: 22px;
  padding: 0 10px;
}

.capture-card .cap-bars { text-align: left; margin-bottom: 6px; }

.capture-card .cap-bar-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 7px;
}

.capture-card .cap-bar-label {
  font-size: 0.78rem;
  font-weight: 700;
  color: rgba(255,255,255,0.85);
  min-width: 48px;
  text-align: right;
}

.capture-card .cap-bar-track {
  flex: 1;
  height: 14px;
  background: rgba(255,255,255,0.18);
  border-radius: 8px;
  overflow: hidden;
}

.capture-card .cap-bar-fill {
  height: 100%;
  border-radius: 8px;
  background: rgba(255,255,255,0.55);
}

.capture-card .cap-bar-pts {
  font-size: 0.75rem;
  font-weight: 700;
  color: rgba(255,255,255,0.7);
  min-width: 26px;
}

/* ── Confetti ── */
.confetti-box {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 999;
  overflow: hidden;
}

.confetti-dot {
  position: absolute;
  top: -20px;
  border-radius: 3px;
  animation: fall linear forwards;
}

@keyframes fall {
  0% { transform: translateY(0) rotate(0deg); opacity:1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity:0; }
}

/* ── Decorations ── */
.deco {
  position: fixed;
  font-size: 30px;
  opacity: 0.12;
  pointer-events: none;
  z-index: 0;
  animation: decoD 14s ease-in-out infinite;
}

@keyframes decoD {
  0%,100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-18px) rotate(8deg); }
}

.screen { display: none; }
.screen.on { display: block; }

/* ── Responsive ── */
@media (max-width: 640px) {
  body { padding: 12px; }
  .glass-card { padding: 28px 18px; }
  .start-screen h1 { font-size: 1.75rem; }
  .start-screen .emoji-hero { font-size: 56px; }
  .question-text { font-size: 0.98rem; }
  .answers-grid {
    grid-template-columns: 1fr;
    gap: 10px;
  }
  .answer-btn { font-size: 0.88rem; padding: 13px 14px; }
  .res-emoji { font-size: 64px; }
  .res-badge { font-size: 1.35rem; }
  .sound-toggle {
    width: 42px;
    height: 42px;
    font-size: 19px;
    top: 12px;
    left: 12px;
  }
  .sound-tooltip { display: none; }
}
</style>
</head>
<body>

<!-- Sound Toggle -->
<div class="sound-toggle" id="soundToggle" onclick="toggleSound()">
  <span class="icon-on">🔊</span>
  <span class="icon-off">🔇</span>
  <span class="sound-tooltip" id="soundTip">효과음 ON</span>
</div>

<!-- Decorations -->
<div class="deco" style="top:8%;left:4%;animation-delay:0s;">🍎</div>
<div class="deco" style="top:25%;right:6%;animation-delay:2s;">✏️</div>
<div class="deco" style="top:55%;left:2%;animation-delay:4s;">📚</div>
<div class="deco" style="top:75%;right:4%;animation-delay:6s;">🎒</div>
<div class="deco" style="top:45%;left:92%;animation-delay:8s;">🏫</div>
<div class="deco" style="top:90%;left:15%;animation-delay:3s;">🖍️</div>

<div class="app-container">

  <!-- START -->
  <div class="glass-card screen on" id="screenStart">
    <div class="start-screen">
      <div class="emoji-hero">🔮</div>
      <h1>나에게 맞는<br>운명의 학년 찾기</h1>
      <p class="sub">12개의 질문에 솔직하게 답하고<br>당신에게 운명처럼 어울리는 학년을 확인하세요!<br>🍎 진지함은 쏙 빼고 재미만 넣었습니다 🍎</p>
      <button class="start-btn" onclick="beginQuiz()">테스트 시작하기 ✨</button>
    </div>
  </div>

  <!-- QUIZ -->
  <div class="glass-card screen" id="screenQuiz">
    <div class="progress-wrap">
      <div class="progress-info">
        <span class="q-num" id="elQNum">Q1</span>
        <span class="q-count" id="elQCount">1 / 12</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="elProgress" style="width:0%"></div>
      </div>
    </div>
    <div class="question-section" id="elQSection">
      <div class="question-text" id="elQText"></div>
      <div class="answers-grid" id="elAnswers"></div>
    </div>
  </div>

  <!-- RESULT -->
  <div class="glass-card screen" id="screenResult">
    <div class="result-screen" id="elResult"></div>
  </div>

</div>

<script>
/* ═══════════════════════════════════════
   🔊  Web Audio API – Sound Engine
   ═══════════════════════════════════════ */
let audioCtx = null;
let soundOn = true;

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
  return audioCtx;
}

function toggleSound() {
  soundOn = !soundOn;
  const tog = document.getElementById('soundToggle');
  const tip = document.getElementById('soundTip');
  if (soundOn) {
    tog.classList.remove('muted');
    tip.textContent = '효과음 ON';
    // Play a tiny blip to confirm
    playSelectSound();
  } else {
    tog.classList.add('muted');
    tip.textContent = '효과음 OFF';
  }
}

/* ── Sound 1: 답변 선택 "뽀잉" ── */
function playSelectSound() {
  if (!soundOn) return;
  try {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;

    // Main pop tone
    const osc1 = ctx.createOscillator();
    const gain1 = ctx.createGain();
    osc1.type = 'sine';
    osc1.frequency.setValueAtTime(880, now);
    osc1.frequency.exponentialRampToValueAtTime(1320, now + 0.08);
    osc1.frequency.exponentialRampToValueAtTime(1100, now + 0.15);
    gain1.gain.setValueAtTime(0.18, now);
    gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
    osc1.connect(gain1);
    gain1.connect(ctx.destination);
    osc1.start(now);
    osc1.stop(now + 0.2);

    // Sparkle overtone
    const osc2 = ctx.createOscillator();
    const gain2 = ctx.createGain();
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(1760, now + 0.03);
    osc2.frequency.exponentialRampToValueAtTime(2200, now + 0.12);
    gain2.gain.setValueAtTime(0.08, now + 0.03);
    gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
    osc2.connect(gain2);
    gain2.connect(ctx.destination);
    osc2.start(now + 0.03);
    osc2.stop(now + 0.18);
  } catch(e) {}
}

/* ── Sound 2: 결과 "짜잔~!" 팡파레 ── */
function playResultSound() {
  if (!soundOn) return;
  try {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;

    const notes = [
      { freq: 523.25, start: 0,    dur: 0.15 },  // C5
      { freq: 659.25, start: 0.12, dur: 0.15 },  // E5
      { freq: 783.99, start: 0.24, dur: 0.15 },  // G5
      { freq: 1046.5, start: 0.38, dur: 0.35 },  // C6 (hold)
    ];

    notes.forEach(n => {
      // Main tone
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(n.freq, now + n.start);
      gain.gain.setValueAtTime(0, now + n.start);
      gain.gain.linearRampToValueAtTime(0.2, now + n.start + 0.02);
      gain.gain.setValueAtTime(0.2, now + n.start + n.dur * 0.6);
      gain.gain.exponentialRampToValueAtTime(0.001, now + n.start + n.dur + 0.15);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now + n.start);
      osc.stop(now + n.start + n.dur + 0.15);

      // Harmonic shimmer
      const osc2 = ctx.createOscillator();
      const gain2 = ctx.createGain();
      osc2.type = 'sine';
      osc2.frequency.setValueAtTime(n.freq * 2, now + n.start);
      gain2.gain.setValueAtTime(0, now + n.start);
      gain2.gain.linearRampToValueAtTime(0.06, now + n.start + 0.02);
      gain2.gain.exponentialRampToValueAtTime(0.001, now + n.start + n.dur + 0.1);
      osc2.connect(gain2);
      gain2.connect(ctx.destination);
      osc2.start(now + n.start);
      osc2.stop(now + n.start + n.dur + 0.1);
    });

    // Final sparkle sweep
    const swOsc = ctx.createOscillator();
    const swGain = ctx.createGain();
    swOsc.type = 'sine';
    swOsc.frequency.setValueAtTime(2000, now + 0.55);
    swOsc.frequency.exponentialRampToValueAtTime(4000, now + 0.75);
    swOsc.frequency.exponentialRampToValueAtTime(3000, now + 0.95);
    swGain.gain.setValueAtTime(0, now + 0.55);
    swGain.gain.linearRampToValueAtTime(0.04, now + 0.6);
    swGain.gain.exponentialRampToValueAtTime(0.001, now + 1.0);
    swOsc.connect(swGain);
    swGain.connect(ctx.destination);
    swOsc.start(now + 0.55);
    swOsc.stop(now + 1.0);
  } catch(e) {}
}

let cur = 0, sc = [0,0,0,0,0,0];
let lastResult = null; // for capture

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

function beginQuiz() {
  cur = 0;
  sc = [0,0,0,0,0,0];
  show('screenQuiz');
  renderQ();
}

function renderQ() {
  const d = QS[cur];
  document.getElementById('elQNum').textContent = `Q${cur+1}`;
  document.getElementById('elQCount').textContent = `${cur+1} / 12`;
  document.getElementById('elProgress').style.width = `${(cur/12)*100}%`;

  const sec = document.getElementById('elQSection');
  sec.style.animation = 'none';
  sec.offsetHeight;
  sec.style.animation = 'fadeSlide 0.45s ease both';

  document.getElementById('elQText').innerHTML = `<span class="q-emoji">${d.e}</span> ${d.q}`;

  const g = document.getElementById('elAnswers');
  g.innerHTML = '';
  d.a.forEach((t, i) => {
    const b = document.createElement('button');
    b.className = 'answer-btn';
    b.innerHTML = `<span class="num-badge">${i+1}</span><span>${t}</span>`;
    b.onclick = () => pick(i, b);
    g.appendChild(b);
  });
}

function pick(idx, btn) {
  document.querySelectorAll('.answer-btn').forEach(b => b.classList.remove('picked'));
  btn.classList.add('picked');
  sc[idx]++;

  // 🔊 답변 선택 효과음
  playSelectSound();

  setTimeout(() => {
    cur++;
    if (cur >= 12) showResult();
    else renderQ();
  }, 380);
}

function showResult() {
  show('screenResult');
  document.getElementById('elProgress').style.width = '100%';

  let mx = Math.max(...sc);
  let wi = [];
  sc.forEach((v,i) => { if(v===mx) wi.push(i); });
  let wIdx = Math.max(...wi);
  let g = wIdx + 1;
  let r = RES[g];

  lastResult = { r, g, scores: [...sc] };

  spawnConfetti();

  // 🔊 결과 팡파레 효과음
  playResultSound();

  let bars = '';
  for(let i=0;i<6;i++){
    let pct = (sc[i]/12)*100;
    bars += `<div class="score-row">
      <span class="score-label">${i+1}학년</span>
      <div class="score-track"><div class="score-fill sf${i+1}" id="sf${i}" data-w="${pct}"></div></div>
      <span class="score-pts">${sc[i]}점</span>
    </div>`;
  }

  document.getElementById('elResult').innerHTML = `
    <div class="res-emoji">${r.emoji}</div>
    <div class="res-badge ${r.cls}">당신의 운명은 ${r.grade}!</div>
    <div class="res-title">[ ${r.title} ]</div>
    <div class="res-desc">${r.desc.replace(/\n/g,'<br>')}</div>
    <div class="score-section">
      <h3>📊 학년별 점수 분석</h3>
      ${bars}
    </div>
    <div class="result-actions">
      <button class="save-btn" id="saveBtn" onclick="saveResult()">내 결과 저장하기 📸</button>
      <button class="retry-btn" onclick="goHome()">다시 테스트하기 🔄</button>
    </div>
  `;

  setTimeout(()=>{
    for(let i=0;i<6;i++){
      const el = document.getElementById('sf'+i);
      el.style.width = el.dataset.w + '%';
    }
  }, 350);
}

function goHome() {
  const c = document.querySelector('.confetti-box');
  if(c) c.remove();
  show('screenStart');
}

function spawnConfetti() {
  const old = document.querySelector('.confetti-box');
  if(old) old.remove();
  const box = document.createElement('div');
  box.className = 'confetti-box';
  document.body.appendChild(box);
  const cols = ['#ff9a9e','#fad0c4','#a18cd1','#fbc2eb','#84fab0','#8fd3f4','#f6d365','#667eea','#fab1a0','#74b9ff','#fd79a8','#a29bfe','#ffeaa7','#55efc4'];
  for(let i=0;i<90;i++){
    const d = document.createElement('div');
    d.className = 'confetti-dot';
    d.style.left = Math.random()*100+'%';
    d.style.background = cols[Math.floor(Math.random()*cols.length)];
    d.style.width = (Math.random()*9+5)+'px';
    d.style.height = (Math.random()*9+5)+'px';
    d.style.animationDuration = (Math.random()*2.5+2)+'s';
    d.style.animationDelay = (Math.random()*2)+'s';
    d.style.borderRadius = Math.random()>0.5?'50%':'3px';
    box.appendChild(d);
  }
  setTimeout(()=>box.remove(), 6000);
}

/* ═══════════════════════════════════════
   📸  Save Result as Image
   ═══════════════════════════════════════ */
const gradientMap = {
  g1: 'linear-gradient(135deg, #ff9a9e 0%, #fad0c4 50%, #ffecd2 100%)',
  g2: 'linear-gradient(135deg, #c9b1ff 0%, #fbc2eb 50%, #f3e7ff 100%)',
  g3: 'linear-gradient(135deg, #fbc2eb 0%, #f6d365 50%, #ffecd2 100%)',
  g4: 'linear-gradient(135deg, #84fab0 0%, #8fd3f4 50%, #c3f0e8 100%)',
  g5: 'linear-gradient(135deg, #a6c0fe 0%, #f68084 50%, #fbc2eb 100%)',
  g6: 'linear-gradient(135deg, #667eea 0%, #764ba2 50%, #a18cd1 100%)',
};

async function saveResult() {
  if (!lastResult) return;
  const btn = document.getElementById('saveBtn');
  btn.classList.add('saving');
  btn.textContent = '저장 중... ⏳';

  const { r, g, scores } = lastResult;

  // Build a dedicated capture card (no glassmorphism, solid bg for clean screenshot)
  const card = document.createElement('div');
  card.className = 'capture-card';
  card.style.background = gradientMap[r.cls];

  let barsHtml = '';
  for (let i = 0; i < 6; i++) {
    const pct = (scores[i] / 12) * 100;
    barsHtml += `
      <div class="cap-bar-row">
        <span class="cap-bar-label">${i+1}학년</span>
        <div class="cap-bar-track">
          <div class="cap-bar-fill" style="width:${pct}%"></div>
        </div>
        <span class="cap-bar-pts">${scores[i]}점</span>
      </div>`;
  }

  card.innerHTML = `
    <div class="cap-emoji">${r.emoji}</div>
    <div class="cap-badge">당신의 운명은 ${r.grade}!</div>
    <div class="cap-title">[ ${r.title} ]</div>
    <div class="cap-desc">${r.desc.replace(/\n/g, '<br>')}</div>
    <div class="cap-bars">${barsHtml}</div>
    <div class="cap-watermark">🔮 나에게 맞는 운명의 학년 찾기</div>
  `;

  document.body.appendChild(card);

  try {
    // Wait for fonts to render
    await new Promise(res => setTimeout(res, 300));

    const canvas = await html2canvas(card, {
      scale: 2,
      backgroundColor: null,
      useCORS: true,
      logging: false,
      width: 600,
      windowWidth: 600
    });

    // Try native share (mobile), fallback to download
    canvas.toBlob(async (blob) => {
      if (navigator.share && navigator.canShare) {
        const file = new File([blob], `운명의학년_${r.grade}.png`, { type: 'image/png' });
        const shareData = { files: [file], title: '나에게 맞는 운명의 학년 찾기', text: `나의 운명의 학년은 ${r.grade}! - ${r.title}` };
        try {
          if (navigator.canShare(shareData)) {
            await navigator.share(shareData);
            card.remove();
            btn.classList.remove('saving');
            btn.textContent = '내 결과 저장하기 📸';
            return;
          }
        } catch(e) {
          // User cancelled share or not supported, fall through to download
        }
      }

      // Fallback: download
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `운명의학년_${r.grade}.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      card.remove();
      btn.classList.remove('saving');
      btn.innerHTML = '저장 완료! ✅';
      setTimeout(() => { btn.textContent = '내 결과 저장하기 📸'; }, 2000);
    }, 'image/png');

  } catch(e) {
    console.error('Capture failed:', e);
    card.remove();
    btn.classList.remove('saving');
    btn.textContent = '내 결과 저장하기 📸';
    alert('이미지 저장에 실패했습니다. 스크린샷을 이용해주세요.');
  }
}
