<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧬 나의 '천생 교사' 유전자 검사</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --bg-light: #fef9f0;
  --bg-cream: #fffbf5;
  --gold-main: #ff9f1c;
  --gold-light: #ffc857;
  --gold-dark: #d68910;
  --cream: #f5e6d3;
  --text-dark: #2c2416;
  --text-mid: rgba(44,36,22,0.7);
  --text-light: rgba(44,36,22,0.5);
  --white: #ffffff;
  --radius: 24px;
  --shadow: 0 12px 40px rgba(255,159,28,0.12);
  --shadow-light: 0 6px 20px rgba(255,159,28,0.08);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  background: var(--bg-light);
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 20px;
  overflow-x: hidden;
}

/* ── Ambient BG ── */
body::before, body::after {
  content: '';
  position: fixed;
  border-radius: 50%;
  filter: blur(150px);
  z-index: 0;
  pointer-events: none;
}

body::before {
  width: 600px; height: 600px;
  background: var(--gold-light);
  opacity: 0.15;
  top: -10%; right: -5%;
  animation: orbA 24s ease-in-out infinite;
}

body::after {
  width: 550px; height: 550px;
  background: var(--gold-main);
  opacity: 0.08;
  bottom: -8%; left: -8%;
  animation: orbB 28s ease-in-out infinite;
}

@keyframes orbA {
  0%,100% { transform:translate(0,0); }
  33% { transform:translate(-14vw, 20vh); }
  66% { transform:translate(-8vw, 10vh); }
}

@keyframes orbB {
  0%,100% { transform:translate(0,0); }
  33% { transform:translate(16vw, -14vh); }
  66% { transform:translate(10vw, -6vh); }
}

/* Gold Grid */
.grid-bg {
  position: fixed; inset:0; z-index:0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(255,159,28,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,159,28,0.03) 1px, transparent 1px);
  background-size: 50px 50px;
}

/* ── Sound Toggle ── */
.sound-toggle {
  position: fixed; top:18px; left:18px; z-index:500;
  width:52px; height:52px; border-radius:50%;
  border: 2px solid var(--gold-main);
  background: var(--white);
  box-shadow: var(--shadow-light);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  transition: all 0.3s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.sound-toggle:hover {
  transform: scale(1.12);
  box-shadow: var(--shadow);
  background: var(--gold-light);
}

.sound-toggle .icon-on,
.sound-toggle .icon-off {
  position: absolute;
  transition: opacity 0.25s, transform 0.25s;
}

.sound-toggle.muted .icon-on { opacity:0; transform:scale(0.6); }
.sound-toggle.muted .icon-off { opacity:1; transform:scale(1); }
.sound-toggle:not(.muted) .icon-on { opacity:1; transform:scale(1); }
.sound-toggle:not(.muted) .icon-off { opacity:0; transform:scale(0.6); }

.sound-tooltip {
  position: absolute; left:62px; top:50%;
  transform: translateY(-50%);
  background: var(--text-dark);
  color: var(--gold-light);
  font-size: 0.7rem; font-weight:700;
  padding: 6px 12px; border-radius:6px;
  white-space: nowrap;
  opacity:0; pointer-events:none;
  transition: opacity 0.2s;
  letter-spacing: 0.5px;
}

.sound-toggle:hover .sound-tooltip { opacity:1; }

/* ── App ── */
.app-container {
  position: relative; z-index:1;
  width: 100%; max-width: 760px;
  display: flex; flex-direction: column; align-items: center;
  padding: 20px 0 40px;
}

.glass-card {
  background: var(--white);
  border: 2px solid var(--gold-light);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 48px 40px;
  width: 100%;
  animation: cardIn 0.6s cubic-bezier(.23,1,.32,1) both;
}

@keyframes cardIn {
  from { opacity:0; transform:translateY(32px) scale(0.96); }
  to { opacity:1; transform:translateY(0) scale(1); }
}

/* ── Start ── */
.start-screen { text-align:center; }

.start-screen .emoji-hero {
  font-size:80px; margin-bottom:16px;
  display:inline-block;
  animation: heroFloat 3s ease-in-out infinite;
}

@keyframes heroFloat {
  0%,100% { transform:translateY(0) rotate(0deg); }
  50% { transform:translateY(-18px) rotate(2deg); }
}

.start-screen h1 {
  font-family:'Playfair Display',serif;
  font-size:2.6rem; font-weight:700;
  color: var(--text-dark);
  line-height:1.3; margin-bottom:8px;
  letter-spacing: -1px;
}

.start-screen h1 span {
  background: linear-gradient(135deg, var(--gold-main), var(--gold-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.series-tag {
  display:inline-block;
  padding:8px 20px; border-radius:50px;
  background: linear-gradient(135deg, rgba(255,159,28,0.1), rgba(255,200,87,0.1));
  border:1.5px solid var(--gold-main);
  color: var(--gold-dark);
  font-size:0.78rem; font-weight:700;
  margin-bottom:20px; letter-spacing:1px;
}

.start-screen .sub {
  font-size:0.96rem;
  color: var(--text-mid);
  line-height:1.85; margin-bottom:40px;
}

.start-btn {
  display:inline-flex; align-items:center; gap:10px;
  padding:18px 60px; border:none; border-radius:50px;
  background: linear-gradient(135deg, var(--gold-main), var(--gold-light));
  color: var(--white);
  font-family:'Noto Sans KR',sans-serif;
  font-size:1.2rem; font-weight:700;
  cursor:pointer; transition:all 0.3s;
  box-shadow: var(--shadow);
  position:relative; overflow:hidden;
}

.start-btn::after {
  content:''; position:absolute;
  top:-50%; left:-50%; width:200%; height:200%;
  background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.25) 50%, transparent 70%);
  animation: shimmer 3.5s infinite;
}

@keyframes shimmer {
  0% { transform:translateX(-100%) rotate(25deg); }
  100% { transform:translateX(100%) rotate(25deg); }
}

.start-btn:hover {
  transform:translateY(-4px);
  box-shadow: 0 16px 48px rgba(255,159,28,0.25);
}

/* ── Progress ── */
.progress-wrap { width:100%; margin-bottom:28px; }

.progress-info {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:12px;
}

.progress-info .q-num {
  font-family:'Playfair Display',serif;
  font-size:1.4rem; font-weight:700;
  color: var(--gold-dark);
  letter-spacing: 1px;
}

.progress-info .q-count {
  font-size:0.84rem; color:var(--text-light); font-weight:600;
}

.progress-bar-bg {
  width:100%; height:12px;
  background: var(--cream);
  border-radius:12px; overflow:hidden;
  border: 1.5px solid var(--gold-light);
}

.progress-bar-fill {
  height:100%;
  background: linear-gradient(90deg, var(--gold-main), var(--gold-light));
  border-radius:12px;
  transition: width 0.5s cubic-bezier(.23,1,.32,1);
  box-shadow: inset 0 2px 4px rgba(255,159,28,0.3);
}

/* ── Question ── */
.question-section { animation: fadeSlide 0.45s ease both; }

@keyframes fadeSlide {
  from { opacity:0; transform:translateX(40px); }
  to { opacity:1; transform:translateX(0); }
}

.question-text {
  font-size:1.12rem; font-weight:700;
  color: var(--text-dark);
  line-height:1.8; margin-bottom:28px;
  word-break:keep-all;
}

.question-text .q-emoji {
  display:inline-block; margin-right:8px; font-size:1.4rem;
}

/* ── Answers ── */
.answers-grid {
  display:grid; grid-template-columns:1fr; gap:10px;
}

.answer-btn {
  display:flex; align-items:center; gap:14px;
  padding:16px 18px;
  border:1.5px solid var(--gold-light);
  border-radius:14px;
  background: var(--bg-cream);
  cursor:pointer; transition:all 0.22s ease;
  text-align:left;
  font-family:'Noto Sans KR',sans-serif;
  font-size:0.87rem; color:var(--text-mid);
  line-height:1.65; word-break:keep-all;
}

.answer-btn .score-badge {
  flex-shrink:0; width:36px; height:36px;
  border-radius:50%;
  background: linear-gradient(135deg, var(--gold-main), var(--gold-light));
  color:var(--white);
  display:flex; align-items:center; justify-content:center;
  font-size:0.8rem; font-weight:700;
}

.answer-btn:hover {
  background: var(--gold-light);
  border-color: var(--gold-dark);
  transform:translateX(6px);
  box-shadow: var(--shadow-light);
  color:var(--text-dark);
}

.answer-btn:active { transform:scale(0.98); }

.answer-btn.picked {
  background: var(--gold-main);
  border-color: var(--gold-dark);
  box-shadow: var(--shadow);
  color:var(--white);
  pointer-events:none;
}

.answer-btn.picked .score-badge {
  background: var(--white);
  color: var(--gold-main);
}

/* ── Result ── */
.result-screen {
  text-align:center;
  animation: popIn 0.65s cubic-bezier(.23,1,.32,1) both;
}

@keyframes popIn {
  from { opacity:0; transform:scale(0.82) translateY(30px); }
  to { opacity:1; transform:scale(1) translateY(0); }
}

.res-emoji {
  font-size:92px; display:inline-block; margin-bottom:16px;
  animation: emojiDance 1.4s ease-in-out infinite;
}

@keyframes emojiDance {
  0%,100% { transform:scale(1) rotate(0deg); }
  25% { transform:scale(1.16) rotate(-8deg); }
  75% { transform:scale(1.16) rotate(8deg); }
}

.res-score-box {
  display:inline-block;
  padding:14px 40px; border-radius:50px;
  background: linear-gradient(135deg, var(--gold-main), var(--gold-light));
  color: var(--white);
  font-size:1.5rem; font-weight:700;
  margin-bottom:12px;
  font-family:'Playfair Display',serif;
  letter-spacing: 1px;
  box-shadow: var(--shadow);
}

.res-type-badge {
  display:block;
  font-family:'Playfair Display',serif;
  font-size:1.8rem; font-weight:700;
  margin-bottom:8px;
  color: var(--gold-dark);
}

.res-tier {
  display:inline-block;
  padding:8px 24px; border-radius:40px;
  background: var(--cream);
  border: 2px solid var(--gold-main);
  font-size:0.95rem; font-weight:700;
  color: var(--gold-dark);
  margin-bottom:16px;
  letter-spacing: 1px;
}

.res-title {
  font-family:'Playfair Display',serif;
  font-size:1.4rem; font-weight:700;
  color:var(--text-dark); margin-bottom:14px;
  line-height: 1.4;
}

.res-desc {
  font-size:0.98rem; color:var(--text-mid);
  line-height:2; margin-bottom:24px;
  word-break:keep-all; padding:0 8px;
}

/* ── Analysis Grid ── */
.analysis-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:16px;
  margin-bottom:32px;
}

.analysis-box {
  padding:18px 20px; border-radius:14px;
  text-align:left;
  border: 1.5px solid var(--gold-light);
}

.analysis-label {
  font-size:0.75rem; font-weight:700;
  letter-spacing:1px; margin-bottom:8px;
  color: var(--gold-main);
  text-transform: uppercase;
}

.analysis-value {
  font-size:0.96rem; font-weight:700;
  color:var(--text-dark); line-height:1.6;
}

/* ── Stats ── */
.stats-section {
  margin-bottom:32px; text-align:left;
  padding: 24px;
  background: var(--cream);
  border-radius: 14px;
  border: 1.5px solid var(--gold-light);
}

.stats-section h3 {
  font-size:0.9rem; font-weight:700;
  color:var(--text-dark); margin-bottom:16px;
  text-align:center;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.stat-row {
  display:flex; align-items:center; gap:12px; margin-bottom:12px;
  font-size:0.88rem;
}

.stat-label {
  font-weight:700;
  color:var(--text-dark); 
  min-width:100px;
}

.stat-bar-bg {
  flex:1; height:20px;
  background:var(--white);
  border-radius:10px; overflow:hidden;
  border: 1px solid var(--gold-light);
}

.stat-bar {
  height:100%; border-radius:10px;
  background:linear-gradient(90deg, var(--gold-main), var(--gold-light));
  transition: width 1.2s cubic-bezier(.23,1,.32,1);
  width:0;
}

/* ── Action Buttons ── */
.result-actions {
  display:flex; gap:14px; justify-content:center; flex-wrap:wrap;
}

.save-btn {
  display:inline-flex; align-items:center; gap:8px;
  padding:16px 44px; border:none; border-radius:50px;
  background: linear-gradient(135deg, var(--gold-main), var(--gold-light));
  color:var(--white);
  font-family:'Noto Sans KR',sans-serif;
  font-size:1.06rem; font-weight:700;
  cursor:pointer; transition:all 0.3s;
  box-shadow:var(--shadow);
}

.save-btn:hover {
  transform:translateY(-3px);
  box-shadow: 0 16px 48px rgba(255,159,28,0.3);
}

.save-btn.saving { pointer-events:none; opacity:0.7; }

.retry-btn {
  display:inline-flex; align-items:center; gap:8px;
  padding:16px 44px; border:2px solid var(--gold-main); border-radius:50px;
  background:transparent;
  color:var(--gold-main);
  font-family:'Noto Sans KR',sans-serif;
  font-size:1.06rem; font-weight:700;
  cursor:pointer; transition:all 0.3s;
}

.retry-btn:hover {
  background:var(--gold-main);
  color:var(--white);
  transform:translateY(-3px);
  box-shadow:var(--shadow);
}

/* ── Capture Card ── */
.capture-card {
  position:fixed; left:-9999px; top:0;
  width:720px; padding:56px 48px 48px;
  border-radius:32px;
  font-family:'Noto Sans KR',sans-serif;
  text-align:center; z-index:-1;
  background: var(--white);
  border: 3px solid var(--gold-light);
}

.capture-card .cap-wm {
  font-size:0.7rem; color:var(--text-light);
  margin-top:24px; letter-spacing:1.2px;
  font-weight:600;
}

.capture-card .cap-emoji { font-size:80px; margin-bottom:14px; }

.capture-card .cap-score {
  display:inline-block; padding:12px 36px; border-radius:50px;
  background: linear-gradient(135deg, var(--gold-main), var(--gold-light));
  color: var(--white);
  font-family:'Playfair Display',serif;
  font-size:1.6rem; font-weight:700;
  margin-bottom:12px;
  letter-spacing: 1px;
}

.capture-card .cap-tier {
  display:inline-block; padding:8px 24px; border-radius:40px;
  background: var(--cream);
  border: 2px solid var(--gold-main);
  color: var(--gold-dark);
  font-size:0.95rem; font-weight:700;
  margin-bottom:10px;
  letter-spacing: 1px;
}

.capture-card .cap-title {
  font-family:'Playfair Display',serif;
  font-size:1.35rem; font-weight:700;
  color:var(--text-dark); margin-bottom:12px;
}

.capture-card .cap-desc {
  font-size:0.9rem; color:var(--text-mid);
  line-height:1.9; word-break:keep-all;
  margin-bottom:20px; padding:0 12px;
}

.capture-card .cap-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:12px;
  margin-bottom:12px;
}

.capture-card .cap-box {
  padding:14px 16px; border-radius:12px;
  text-align:left; border:1.5px solid var(--gold-light);
  background: var(--cream);
}

.capture-card .cap-label {
  font-size:0.7rem; font-weight:700;
  margin-bottom:4px; letter-spacing:0.8px;
  color:var(--gold-main);
  text-transform: uppercase;
}

.capture-card .cap-value {
  font-size:0.88rem; font-weight:700;
  color:var(--text-dark); line-height:1.5;
}

.capture-card .cap-stats { text-align:left; margin-top:16px; }

.capture-card .cap-stat {
  display:flex; align-items:center; gap:8px; margin-bottom:8px;
  font-size:0.8rem;
}

.capture-card .cap-stat-label {
  font-weight:700;
  color:var(--text-dark); 
  min-width:80px;
}

.capture-card .cap-stat-bar {
  flex:1; height:14px;
  background: var(--cream);
  border-radius:8px; overflow:hidden;
  border: 0.5px solid var(--gold-main);
}

.capture-card .cap-stat-fill {
  height:100%; border-radius:8px;
  background:linear-gradient(90deg, var(--gold-main), var(--gold-light));
}

.capture-card .cap-stat-pct {
  font-weight:700;
  color:var(--text-mid); min-width:28px; font-size:0.75rem;
}

/* ── Confetti ── */
.confetti-box {
  position:fixed; top:0; left:0;
  width:100%; height:100%;
  pointer-events:none; z-index:999; overflow:hidden;
}

.confetti-dot {
  position:absolute; top:-20px; border-radius:50%;
  animation: fall linear forwards;
}

@keyframes fall {
  0% { transform:translateY(0) rotate(0deg); opacity:1; }
  100% { transform:translateY(110vh) rotate(720deg); opacity:0; }
}

/* ── Deco ── */
.deco {
  position:fixed; font-size:32px; opacity:0.04;
  pointer-events:none; z-index:0;
  animation: decoD 16s ease-in-out infinite;
}

@keyframes decoD {
  0%,100% { transform:translateY(0) rotate(0deg); }
  50% { transform:translateY(-20px) rotate(8deg); }
}

.screen { display:none; }
.screen.on { display:block; }

/* ── Responsive ── */
@media (max-width:640px) {
  body { padding:12px; }
  .glass-card { padding:32px 20px; }
  .start-screen h1 { font-size:1.9rem; }
  .start-screen .emoji-hero { font-size:64px; }
  .question-text { font-size:1.02rem; }
  .answers-grid { gap:8px; }
  .answer-btn { font-size:0.88rem; padding:14px 16px; gap:12px; }
  .res-emoji { font-size:72px; }
  .res-type-badge { font-size:1.4rem; }
  .sound-toggle { width:46px; height:46px; font-size:20px; top:12px; left:12px; }
  .sound-tooltip { display:none; }
  .result-actions { flex-direction:column; align-items:stretch; }
  .save-btn, .retry-btn { width:100%; }
  .analysis-grid { grid-template-columns:1fr; }
  .analysis-box { text-align:center; }
}
</style>
</head>
<body>

<div class="grid-bg"></div>

<div class="sound-toggle" id="soundToggle" onclick="toggleSound()">
  <span class="icon-on">🔊</span>
  <span class="icon-off">🔇</span>
  <span class="sound-tooltip" id="soundTip">효과음 ON</span>
</div>

<div class="deco" style="top:5%;left:8%;animation-delay:0s;">✨</div>
<div class="deco" style="top:25%;right:7%;animation-delay:2s;">👑</div>
<div class="deco" style="top:55%;left:4%;animation-delay:4s;">🧬</div>
<div class="deco" style="top:75%;right:6%;animation-delay:6s;">⭐</div>
<div class="deco" style="top:35%;left:92%;animation-delay:8s;">💎</div>
<div class="deco" style="top:88%;left:12%;animation-delay:3s;">🏆</div>

<div class="app-container">

  <!-- START -->
  <div class="glass-card screen on" id="screenStart">
    <div class="start-screen">
      <div class="emoji-hero">🧬</div>
      <h1>나의 '천생 교사'<br><span>유전자 검사</span></h1>
      <div class="series-tag">시리즈 10탄 · 최종 진단</div>
      <p class="sub">12가지 상황에서 드러나는 당신의 교사 DNA<br>당신은 정말 교사 유전자를 타고났을까?<br>🧬 교신부터 영혼 가출까지, 5단계 진단 결과 🧬</p>
      <button class="start-btn" onclick="beginQuiz()">유전자 검사 시작하기 🔬</button>
    </div>
  </div>

  <!-- QUIZ -->
  <div class="glass-card screen" id="screenQuiz">
    <div class="progress-wrap">
      <div class="progress-info">
        <span class="q-num" id="elQNum">Q1</span>
        <span class="q-count" id="elQCount">1 / 12</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="elProgress" style="width:0%"></div>
      </div>
    </div>
    <div class="question-section" id="elQSection">
      <div class="question-text" id="elQText"></div>
      <div class="answers-grid" id="elAnswers"></div>
    </div>
  </div>

  <!-- RESULT -->
  <div class="glass-card screen" id="screenResult">
    <div class="result-screen" id="elResult"></div>
  </div>

</div>

<script>
/* ═══════════════════════════════════════
   🔊  Sound Engine
   ═══════════════════════════════════════ */
let audioCtx = null, soundOn = true;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function toggleSound() {
  soundOn = !soundOn;
  const tog = document.getElementById('soundToggle');
  const tip = document.getElementById('soundTip');
  if (soundOn) { tog.classList.remove('muted'); tip.textContent='효과음 ON'; playSelectSound(); }
  else { tog.classList.add('muted'); tip.textContent='효과음 OFF'; }
}

/* Gold Bell Click */
function playSelectSound() {
  if (!soundOn) return;
  try {
    const ctx = getAudioCtx(), now = ctx.currentTime;
    const o1 = ctx.createOscillator(), g1 = ctx.createGain();
    o1.type='sine';
    o1.frequency.setValueAtTime(880, now);
    o1.frequency.exponentialRampToValueAtTime(1320, now+0.04);
    g1.gain.setValueAtTime(0.12, now);
    g1.gain.exponentialRampToValueAtTime(0.001, now+0.15);
    o1.connect(g1); g1.connect(ctx.destination);
    o1.start(now); o1.stop(now+0.15);
  } catch(e){}
}

/* Sacred Chime */
function playResultSound() {
  if (!soundOn) return;
  try {
    const ctx = getAudioCtx(), now = ctx.currentTime;
    const notes = [
      {f:440, s:0, d:0.3},
      {f:554, s:0.2, d:0.3},
      {f:659, s:0.4, d:0.5}
    ];
    notes.forEach(n => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type='sine';
      o.frequency.setValueAtTime(n.f, now+n.s);
      g.gain.setValueAtTime(0, now+n.s);
      g.gain.linearRampToValueAtTime(0.25, now+n.s+0.05);
      g.gain.setValueAtTime(0.25, now+n.s+n.d*0.7);
      g.gain.exponentialRampToValueAtTime(0.001, now+n.s+n.d+0.3);
      o.connect(g); g.connect(ctx.destination);
      o.start(now+n.s); o.stop(now+n.s+n.d+0.3);
    });
  } catch(e){}
}

let cur = 0;
let totalScore = 0;
let lastRes = null;

function show(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

function beginQuiz() {
  cur = 0;
  totalScore = 0;
  show('screenQuiz');
  renderQ();
}

function renderQ() {
  const d = QS[cur];
  document.getElementById('elQNum').textContent = `Q${cur+1}`;
  document.getElementById('elQCount').textContent = `${cur+1} / 12`;
  document.getElementById('elProgress').style.width = `${(cur/12)*100}%`;

  const sec = document.getElementById('elQSection');
  sec.style.animation='none'; sec.offsetHeight;
  sec.style.animation='fadeSlide 0.45s ease both';

  document.getElementById('elQText').innerHTML = `<span class="q-emoji">${d.e}</span> ${d.q}`;

  const g = document.getElementById('elAnswers');
  g.innerHTML = '';
  d.a.forEach((ans, i) => {
    const b = document.createElement('button');
    b.className = 'answer-btn';
    b.innerHTML = `<span class="score-badge">${ans.pts}</span><span>${ans.txt}</span>`;
    b.onclick = () => pick(ans.pts, b);
    g.appendChild(b);
  });
}

function pick(pts, btn) {
  document.querySelectorAll('.answer-btn').forEach(b=>b.classList.remove('picked'));
  btn.classList.add('picked');
  totalScore += pts;
  playSelectSound();

  setTimeout(() => {
    cur++;
    if (cur >= 12) showResult();
    else renderQ();
  }, 380);
}

function showResult() {
  show('screenResult');
  document.getElementById('elProgress').style.width = '100%';

  let tier = TIERS[0];
  for (let t of TIERS) {
    if (totalScore >= t.min && totalScore <= t.max) {
      tier = t;
      break;
    }
  }
  if (totalScore > 72) tier = TIERS[0];

  lastRes = { tier, score: totalScore };

  spawnConfetti();
  playResultSound();

  document.getElementById('elResult').innerHTML = `
    <div class="res-emoji">${tier.emoji}</div>
    <div class="res-score-box">${totalScore} / 72점</div>
    <div class="res-tier">${tier.tier}</div>
    <div class="res-type-badge">${tier.title}</div>
    <div class="res-desc">${tier.desc}</div>
    <div class="analysis-grid">
      <div class="analysis-box">
        <div class="analysis-label">📊 ${tier.stat1}</div>
      </div>
      <div class="analysis-box">
        <div class="analysis-label">💡 ${tier.stat2}</div>
      </div>
    </div>
    <div class="stats-section">
      <h3>유전자 분석 상세</h3>
      <div class="stat-row">
        <span class="stat-label">교직 적성도</span>
        <div class="stat-bar-bg"><div class="stat-bar" id="stat1" data-w="${Math.min(totalScore/72*100, 100)}"></div></div>
        <span>${Math.round(Math.min(totalScore/72*100, 100))}%</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">교사 아우라</span>
        <div class="stat-bar-bg"><div class="stat-bar" id="stat2" data-w="${Math.min(totalScore/60*100, 100)}"></div></div>
        <span>${Math.round(Math.min(totalScore/60*100, 100))}%</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">번아웃 위험도</span>
        <div class="stat-bar-bg"><div class="stat-bar" id="stat3" data-w="${Math.max(0, 100-totalScore/72*100)}"></div></div>
        <span>${Math.round(Math.max(0, 100-totalScore/72*100))}%</span>
      </div>
    </div>
    <div class="result-actions">
      <button class="save-btn" id="saveBtn" onclick="saveResult()">검사 결과 저장하기 📸</button>
      <button class="retry-btn" onclick="goHome()">다시 검사하기 🔄</button>
    </div>
  `;

  setTimeout(() => {
    const stat1 = document.getElementById('stat1');
    const stat2 = document.getElementById('stat2');
    const stat3 = document.getElementById('stat3');
    if (stat1) stat1.style.width = stat1.dataset.w + '%';
    if (stat2) stat2.style.width = stat2.dataset.w + '%';
    if (stat3) stat3.style.width = stat3.dataset.w + '%';
  }, 350);
}

function goHome() {
  const c = document.querySelector('.confetti-box');
  if(c) c.remove();
  show('screenStart');
}

function spawnConfetti() {
  const old = document.querySelector('.confetti-box');
  if(old) old.remove();
  const box = document.createElement('div');
  box.className = 'confetti-box';
  document.body.appendChild(box);
  const cols = ['#ff9f1c','#ffc857','#d68910','#ffb300','#ffe082','#ffb71c','#ffa000','#ff6f00'];
  for(let i=0;i<120;i++){
    const d = document.createElement('div');
    d.className = 'confetti-dot';
    d.style.left = Math.random()*100+'%';
    d.style.background = cols[Math.floor(Math.random()*cols.length)];
    d.style.width = (Math.random()*11+5)+'px';
    d.style.height = (Math.random()*11+5)+'px';
    d.style.animationDuration = (Math.random()*2.8+2.2)+'s';
    d.style.animationDelay = (Math.random()*2)+'s';
    box.appendChild(d);
  }
  setTimeout(()=>box.remove(), 7000);
}

/* ═══════════════════════════════════════
   📸  Save Result
   ═══════════════════════════════════════ */
async function saveResult() {
  if (!lastRes) return;
  const btn = document.getElementById('saveBtn');
  btn.classList.add('saving');
  btn.textContent = '저장 중... ⏳';

  const {tier, score} = lastRes;

  const card = document.createElement('div');
  card.className = 'capture-card';
  card.innerHTML = `
    <div class="cap-emoji">${tier.emoji}</div>
    <div class="cap-score">${score} / 72점</div>
    <div class="cap-tier">${tier.tier}</div>
    <div class="cap-title">${tier.title}</div>
    <div class="cap-desc">${tier.desc}</div>
    <div class="cap-grid">
      <div class="cap-box">
        <div class="cap-label">📊 교사 유전자</div>
        <div class="cap-value">${tier.stat1}</div>
      </div>
      <div class="cap-box">
        <div class="cap-label">💡 현황 분석</div>
        <div class="cap-value">${tier.stat2}</div>
      </div>
    </div>
    <div class="cap-stats">
      <div class="cap-stat">
        <span class="cap-stat-label">교직 적성도</span>
        <div class="cap-stat-bar"><div class="cap-stat-fill" style="width:${Math.min(score/72*100, 100)}%"></div></div>
        <span class="cap-stat-pct">${Math.round(Math.min(score/72*100, 100))}%</span>
      </div>
      <div class="cap-stat">
        <span class="cap-stat-label">번아웃 위험</span>
        <div class="cap-stat-bar"><div class="cap-stat-fill" style="width:${Math.max(0, 100-score/72*100)}%"></div></div>
        <span class="cap-stat-pct">${Math.round(Math.max(0, 100-score/72*100))}%</span>
      </div>
    </div>
    <div class="cap-wm">🧬 나의 '천생 교사' 유전자 검사 · 시리즈 10탄 · 최종 진단</div>
  `;

  document.body.appendChild(card);

  try {
    await new Promise(res => setTimeout(res, 300));
    const canvas = await html2canvas(card, {
      scale:2, backgroundColor:'#fef9f0',
      useCORS:true, logging:false,
      width:720, windowWidth:720
    });

    canvas.toBlob(async (blob) => {
      if (navigator.share && navigator.canShare) {
        const file = new File([blob], `천생교사유전자_${tier.tier}.png`, {type:'image/png'});
        const shareData = {files:[file], title:'나의 천생 교사 유전자 검사', text:`내 점수: ${score}/72 (${tier.tier}) - ${tier.title}`};
        try {
          if (navigator.canShare(shareData)) {
            await navigator.share(shareData);
            card.remove();
            btn.classList.remove('saving');
            btn.textContent = '검사 결과 저장하기 📸';
            return;
          }
        } catch(e){}
      }

      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `천생교사유전자_${tier.tier}.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      card.remove();
      btn.classList.remove('saving');
      btn.innerHTML = '저장 완료! ✅';
      setTimeout(()=>{ btn.textContent='검사 결과 저장하기 📸'; }, 2000);
    }, 'image/png');

  } catch(e) {
    console.error('Capture failed:', e);
    card.remove();
    btn.classList.remove('saving');
    btn.textContent = '검사 결과 저장하기 📸';
    alert('이미지 저장에 실패했습니다. 스크린샷을 이용해주세요.');
  }
}
</script>
