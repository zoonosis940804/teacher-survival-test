<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 월요병 생존 수치 진단</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --bg-deep: #1a2d1f;
  --bg-mid: #233029;
  --bg-card: rgba(35,48,41,0.72);
  --glass-border: rgba(100,150,120,0.18);
  --glass-glow: rgba(100,150,120,0.06);
  --danger-red: #e74c3c;
  --warn-orange: #f39c12;
  --calm-green: #2d5a27;
  --sky: #5dade2;
  --text-white: #ecf0f1;
  --text-dim: rgba(236,240,241,0.5);
  --text-mid: rgba(236,240,241,0.78);
  --radius: 22px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  background: linear-gradient(135deg, var(--bg-deep) 0%, #1f3d27 100%);
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 20px;
  overflow-x: hidden;
}

/* ── Ambient BG ── */
body::before, body::after {
  content: '';
  position: fixed;
  border-radius: 50%;
  filter: blur(120px);
  z-index: 0;
  pointer-events: none;
}

body::before {
  width: 520px; height: 520px;
  background: var(--danger-red);
  opacity: 0.06;
  top: -8%; right: -8%;
  animation: orbA 20s ease-in-out infinite;
}

body::after {
  width: 480px; height: 480px;
  background: var(--warn-orange);
  opacity: 0.04;
  bottom: -10%; left: -10%;
  animation: orbB 24s ease-in-out infinite;
}

@keyframes orbA {
  0%,100% { transform:translate(0,0); }
  33% { transform:translate(-12vw, 18vh); }
  66% { transform:translate(-6vw, 8vh); }
}

@keyframes orbB {
  0%,100% { transform:translate(0,0); }
  33% { transform:translate(14vw, -12vh); }
  66% { transform:translate(8vw, -4vh); }
}

/* Blueprint grid */
.grid-bg {
  position: fixed; inset:0; z-index:0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(100,150,120,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(100,150,120,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* ── Sound Toggle ── */
.sound-toggle {
  position: fixed; top:18px; left:18px; z-index:500;
  width:48px; height:48px; border-radius:50%;
  border: 1.5px solid var(--glass-border);
  background: var(--bg-card);
  backdrop-filter: blur(14px);
  box-shadow: 0 0 20px rgba(100,150,120,0.08);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  transition: all 0.3s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.sound-toggle:hover {
  transform: scale(1.1);
  box-shadow: 0 0 28px rgba(231,76,60,0.15);
}

.sound-toggle .icon-on,
.sound-toggle .icon-off {
  position: absolute;
  transition: opacity 0.25s, transform 0.25s;
}

.sound-toggle.muted .icon-on { opacity:0; transform:scale(0.6); }
.sound-toggle.muted .icon-off { opacity:1; transform:scale(1); }
.sound-toggle:not(.muted) .icon-on { opacity:1; transform:scale(1); }
.sound-toggle:not(.muted) .icon-off { opacity:0; transform:scale(0.6); }

.sound-tooltip {
  position: absolute; left:56px; top:50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.7);
  color: var(--warn-orange);
  font-size: 0.72rem; font-weight:500;
  padding: 5px 10px; border-radius:8px;
  white-space: nowrap;
  opacity:0; pointer-events:none;
  transition: opacity 0.2s;
}

.sound-toggle:hover .sound-tooltip { opacity:1; }

/* ── App ── */
.app-container {
  position: relative; z-index:1;
  width: 100%; max-width: 700px;
  display: flex; flex-direction: column; align-items: center;
  padding: 20px 0 40px;
}

.glass-card {
  background: var(--bg-card);
  backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  box-shadow: 0 8px 40px rgba(0,0,0,0.35), inset 0 1px 0 rgba(100,150,120,0.06);
  padding: 40px 32px;
  width: 100%;
  animation: cardIn 0.6s cubic-bezier(.23,1,.32,1) both;
}

@keyframes cardIn {
  from { opacity:0; transform:translateY(30px) scale(0.97); }
  to { opacity:1; transform:translateY(0) scale(1); }
}

/* ── Start ── */
.start-screen { text-align:center; }

.start-screen .emoji-hero {
  font-size:72px; margin-bottom:14px;
  display:inline-block;
  animation: heroFloat 2.5s ease-in-out infinite;
}

@keyframes heroFloat {
  0%,100% { transform:translateY(0) rotate(0deg); }
  50% { transform:translateY(-14px) rotate(-2deg); }
}

.start-screen h1 {
  font-family:'Gaegu',cursive;
  font-size:2.2rem; font-weight:700;
  color: var(--text-white);
  line-height:1.35; margin-bottom:6px;
}

.start-screen h1 span {
  background: linear-gradient(90deg, var(--danger-red), var(--warn-orange));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.series-tag {
  display:inline-block;
  padding:4px 14px; border-radius:20px;
  background: rgba(231,76,60,0.1);
  border:1px solid rgba(231,76,60,0.25);
  color: var(--danger-red);
  font-size:0.75rem; font-weight:700;
  margin-bottom:16px; letter-spacing:0.5px;
}

.start-screen .sub {
  font-size:0.92rem;
  color: var(--text-mid);
  line-height:1.7; margin-bottom:32px;
}

.start-btn {
  display:inline-flex; align-items:center; gap:8px;
  padding:16px 52px; border:none; border-radius:50px;
  background: linear-gradient(135deg, var(--danger-red), var(--warn-orange));
  color: #fff;
  font-family:'Noto Sans KR',sans-serif;
  font-size:1.15rem; font-weight:700;
  cursor:pointer; transition:all 0.3s;
  box-shadow: 0 6px 28px rgba(231,76,60,0.25);
  position:relative; overflow:hidden;
}

.start-btn::after {
  content:''; position:absolute;
  top:-50%; left:-50%; width:200%; height:200%;
  background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.15) 50%, transparent 70%);
  animation: shimmer 3s infinite;
}

@keyframes shimmer {
  0% { transform:translateX(-100%) rotate(25deg); }
  100% { transform:translateX(100%) rotate(25deg); }
}

.start-btn:hover {
  transform:translateY(-3px) scale(1.03);
  box-shadow:0 12px 36px rgba(231,76,60,0.35);
}

/* ── Progress ── */
.progress-wrap { width:100%; margin-bottom:22px; }

.progress-info {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:10px;
}

.progress-info .q-num {
  font-family:'Gaegu',cursive;
  font-size:1.2rem; font-weight:700;
  color: var(--danger-red);
}

.progress-info .q-count {
  font-size:0.85rem; color:var(--text-dim); font-weight:500;
}

.progress-bar-bg {
  width:100%; height:10px;
  background: rgba(255,255,255,0.06);
  border-radius:10px; overflow:hidden;
}

.progress-bar-fill {
  height:100%;
  background: linear-gradient(90deg, var(--warn-orange), var(--danger-red));
  border-radius:10px;
  transition: width 0.5s cubic-bezier(.23,1,.32,1);
}

/* ── Question ── */
.question-section { animation: fadeSlide 0.45s ease both; }

@keyframes fadeSlide {
  from { opacity:0; transform:translateX(36px); }
  to { opacity:1; transform:translateX(0); }
}

.question-text {
  font-size:1.06rem; font-weight:700;
  color: var(--text-white);
  line-height:1.7; margin-bottom:24px;
  word-break:keep-all;
}

.question-text .q-emoji {
  display:inline-block; margin-right:6px; font-size:1.3rem;
}

/* ── Answers ── */
.answers-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:12px;
}

.answer-btn {
  display:flex; align-items:flex-start; gap:10px;
  padding:14px 15px;
  border:1.5px solid rgba(100,150,120,0.1);
  border-radius:16px;
  background:rgba(255,255,255,0.03);
  cursor:pointer; transition:all 0.22s ease;
  text-align:left;
  font-family:'Noto Sans KR',sans-serif;
  font-size:0.84rem; color:var(--text-mid);
  line-height:1.55; word-break:keep-all;
}

.answer-btn .num-badge {
  flex-shrink:0; width:26px; height:26px;
  border-radius:50%;
  background: linear-gradient(135deg, var(--warn-orange), var(--danger-red));
  color:#fff;
  display:flex; align-items:center; justify-content:center;
  font-size:0.7rem; font-weight:700;
  margin-top:1px;
}

.answer-btn:hover {
  background:rgba(231,76,60,0.08);
  border-color:var(--danger-red);
  transform:translateY(-2px);
  box-shadow:0 4px 18px rgba(231,76,60,0.1);
  color:var(--text-white);
}

.answer-btn:active { transform:scale(0.97); }

.answer-btn.picked {
  background:rgba(231,76,60,0.1);
  border-color:var(--danger-red);
  box-shadow:0 0 18px rgba(231,76,60,0.12);
  color:var(--danger-red);
  pointer-events:none;
}

/* ── Result ── */
.result-screen {
  text-align:center;
  animation: popIn 0.65s cubic-bezier(.23,1,.32,1) both;
}

@keyframes popIn {
  from { opacity:0; transform:scale(0.8) translateY(28px); }
  to { opacity:1; transform:scale(1) translateY(0); }
}

.res-emoji {
  font-size:84px; display:inline-block; margin-bottom:12px;
  animation: emojiShake 1.2s ease-in-out infinite;
}

@keyframes emojiShake {
  0%,100% { transform:translateX(0) rotate(0deg); }
  25% { transform:translateX(-8px) rotate(-3deg); }
  75% { transform:translateX(8px) rotate(3deg); }
}

.res-score {
  font-family:'Gaegu',cursive;
  font-size:3.2rem; font-weight:700;
  background: linear-gradient(90deg, var(--warn-orange), var(--danger-red));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom:8px;
}

.res-grade {
  display:inline-block;
  padding:12px 40px; border-radius:50px;
  font-family:'Gaegu',cursive;
  font-size:1.4rem; font-weight:700;
  margin-bottom:12px;
}

.grade-critical {
  background: linear-gradient(135deg, var(--danger-red), #c0392b);
  color: #fff;
}

.grade-severe {
  background: linear-gradient(135deg, var(--warn-orange), #e67e22);
  color: #fff;
}

.grade-moderate {
  background: linear-gradient(135deg, var(--calm-green), #27ae60);
  color: #ecf0f1;
}

.grade-mild {
  background: linear-gradient(135deg, var(--sky), #3498db);
  color: #fff;
}

.grade-clear {
  background: linear-gradient(135deg, #52be80, #16a085);
  color: #fff;
}

.res-title {
  font-family:'Gaegu',cursive;
  font-size:1.3rem; font-weight:700;
  color:var(--danger-red); margin-bottom:8px;
}

.res-desc {
  font-size:0.92rem; color:var(--text-mid);
  line-height:1.85; margin-bottom:24px;
  word-break:keep-all; padding:0 6px;
}

.res-tips {
  background: rgba(231,76,60,0.08);
  border: 1px solid rgba(231,76,60,0.2);
  border-radius: 16px;
  padding: 16px 18px;
  margin-bottom: 24px;
  text-align: left;
}

.res-tips h3 {
  font-size: 0.88rem; font-weight: 700;
  color: var(--danger-red);
  margin-bottom: 10px;
}

.res-tips ul {
  list-style: none;
  font-size: 0.84rem;
  color: var(--text-mid);
  line-height: 1.8;
}

.res-tips li {
  margin-bottom: 6px;
  padding-left: 18px;
  position: relative;
}

.res-tips li::before {
  content: "✓";
  position: absolute;
  left: 0;
  color: var(--warn-orange);
  font-weight: 700;
}

.score-bar {
  margin-top: 20px;
  padding: 16px;
  background: rgba(255,255,255,0.03);
  border-radius: 12px;
}

.score-bar-label {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--text-dim);
  margin-bottom: 8px;
  text-align: left;
}

.score-bar-track {
  width: 100%;
  height: 20px;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}

.score-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--warn-orange), var(--danger-red));
  border-radius: 10px;
  transition: width 1.1s cubic-bezier(.23,1,.32,1);
  width: 0;
  position: relative;
}

.score-bar-fill::after {
  content: attr(data-score);
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  color: #fff;
  font-size: 0.75rem;
  font-weight: 700;
  text-shadow: 0 1px 2px rgba(0,0,0,0.3);
}

/* ── Action Buttons ── */
.result-actions {
  display:flex; gap:12px; justify-content:center; flex-wrap:wrap;
}

.save-btn {
  display:inline-flex; align-items:center; gap:8px;
  padding:15px 36px; border:none; border-radius:50px;
  background:linear-gradient(135deg, var(--calm-green), #27ae60);
  color:#fff;
  font-family:'Noto Sans KR',sans-serif;
  font-size:1.02rem; font-weight:700;
  cursor:pointer; transition:all 0.3s;
  box-shadow:0 6px 22px rgba(45,90,39,0.3);
}

.save-btn:hover {
  transform:translateY(-3px);
  box-shadow:0 10px 28px rgba(45,90,39,0.45);
}

.save-btn.saving { pointer-events:none; opacity:0.7; }

.retry-btn {
  display:inline-flex; align-items:center; gap:8px;
  padding:15px 36px; border:none; border-radius:50px;
  background:linear-gradient(135deg, var(--danger-red), var(--warn-orange));
  color:#fff;
  font-family:'Noto Sans KR',sans-serif;
  font-size:1.02rem; font-weight:700;
  cursor:pointer; transition:all 0.3s;
  box-shadow:0 6px 22px rgba(231,76,60,0.3);
}

.retry-btn:hover {
  transform:translateY(-3px);
  box-shadow:0 10px 28px rgba(231,76,60,0.4);
}

/* ── Capture Card ── */
.capture-card {
  position:fixed; left:-9999px; top:0;
  width:600px; padding:48px 40px 40px;
  border-radius:28px;
  font-family:'Noto Sans KR',sans-serif;
  text-align:center; z-index:-1;
  background: linear-gradient(135deg, #1a2d1f 0%, #233029 100%);
}

.capture-card .cap-wm {
  font-size:0.68rem; color:rgba(236,240,241,0.35);
  margin-top:18px; letter-spacing:1px;
}

.capture-card .cap-emoji { font-size:68px; margin-bottom:10px; }

.capture-card .cap-score {
  font-family:'Gaegu',cursive;
  font-size:2.8rem; font-weight:700;
  background: linear-gradient(90deg, var(--warn-orange), var(--danger-red));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom:8px;
}

.capture-card .cap-grade {
  display:inline-block; padding:10px 36px; border-radius:50px;
  font-family:'Gaegu',cursive;
  font-size:1.3rem; font-weight:700;
  margin-bottom:10px;
}

.capture-card .cap-title {
  font-family:'Gaegu',cursive;
  font-size:1.2rem; font-weight:700;
  color:var(--danger-red); margin-bottom:10px;
}

.capture-card .cap-desc {
  font-size:0.84rem; color:rgba(236,240,241,0.78);
  line-height:1.8; word-break:keep-all;
  margin-bottom:16px; padding:0 10px;
}

.capture-card .cap-tips {
  background: rgba(231,76,60,0.1);
  border: 1px solid rgba(231,76,60,0.2);
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 12px;
  text-align: left;
}

.capture-card .cap-tips-title {
  font-size: 0.72rem; font-weight: 700;
  color: var(--danger-red);
  margin-bottom: 6px;
}

.capture-card .cap-tips-list {
  list-style: none;
  font-size: 0.75rem;
  color: rgba(236,240,241,0.7);
  line-height: 1.6;
}

.capture-card .cap-tips-list li {
  margin-bottom: 4px;
  padding-left: 14px;
  position: relative;
}

.capture-card .cap-tips-list li::before {
  content: "✓";
  position: absolute;
  left: 0;
  color: var(--warn-orange);
  font-weight: 700;
}

.capture-card .cap-bar {
  margin-top: 12px;
  padding: 8px;
  background: rgba(255,255,255,0.04);
  border-radius: 8px;
}

.capture-card .cap-bar-track {
  width: 100%;
  height: 14px;
  background: rgba(255,255,255,0.08);
  border-radius: 7px;
  overflow: hidden;
}

.capture-card .cap-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--warn-orange), var(--danger-red));
  border-radius: 7px;
}

/* ── Confetti ── */
.confetti-box {
  position:fixed; top:0; left:0;
  width:100%; height:100%;
  pointer-events:none; z-index:999; overflow:hidden;
}

.confetti-dot {
  position:absolute; top:-20px; border-radius:3px;
  animation: fall linear forwards;
}

@keyframes fall {
  0% { transform:translateY(0) rotate(0deg); opacity:1; }
  100% { transform:translateY(110vh) rotate(720deg); opacity:0; }
}

/* ── Deco ── */
.deco {
  position:fixed; font-size:26px; opacity:0.05;
  pointer-events:none; z-index:0;
  animation: decoD 14s ease-in-out infinite;
}

@keyframes decoD {
  0%,100% { transform:translateY(0) rotate(0deg); }
  50% { transform:translateY(-16px) rotate(8deg); }
}

.screen { display:none; }
.screen.on { display:block; }

/* ── Responsive ── */
@media (max-width:640px) {
  body { padding:12px; }
  .glass-card { padding:28px 18px; }
  .start-screen h1 { font-size:1.65rem; }
  .start-screen .emoji-hero { font-size:56px; }
  .question-text { font-size:0.96rem; }
  .answers-grid { grid-template-columns:1fr; gap:10px; }
  .answer-btn { font-size:0.88rem; padding:13px 14px; }
  .res-emoji { font-size:64px; }
  .res-score { font-size:2.5rem; }
  .res-grade { font-size:1.1rem; }
  .sound-toggle { width:42px; height:42px; font-size:19px; top:12px; left:12px; }
  .sound-tooltip { display:none; }
  .result-actions { flex-direction:column; align-items:center; }
  .res-tips { padding: 12px 14px; }
  .res-tips h3 { font-size: 0.8rem; }
  .res-tips ul { font-size: 0.78rem; }
}
</style>
</head>
<body>

<div class="grid-bg"></div>

<div class="sound-toggle" id="soundToggle" onclick="toggleSound()">
  <span class="icon-on">🔊</span>
  <span class="icon-off">🔇</span>
  <span class="sound-tooltip" id="soundTip">효과음 ON</span>
</div>

<div class="deco" style="top:5%;left:6%;animation-delay:0s;">📚</div>
<div class="deco" style="top:20%;right:5%;animation-delay:2s;">✏️</div>
<div class="deco" style="top:48%;left:2%;animation-delay:4s;">📋</div>
<div class="deco" style="top:70%;right:4%;animation-delay:6s;">⏰</div>
<div class="deco" style="top:38%;left:92%;animation-delay:8s;">🍎</div>
<div class="deco" style="top:85%;left:10%;animation-delay:3s;">📝</div>

<div class="app-container">

  <!-- START -->
  <div class="glass-card screen on" id="screenStart">
    <div class="start-screen">
      <div class="emoji-hero">😫</div>
      <h1>월요병<br><span>생존 수치 진단</span></h1>
      <div class="series-tag">교사 생존력 테스트 · 12탄</div>
      <p class="sub">일요일 밤 10시부터 월요일 오후까지...<br>당신의 월요병 심각도는 몇 점?<br>📊 방학까지의 거리를 수치화하다 📊</p>
      <button class="start-btn" onclick="beginQuiz()">진단 시작하기 📉</button>
    </div>
  </div>

  <!-- QUIZ -->
  <div class="glass-card screen" id="screenQuiz">
    <div class="progress-wrap">
      <div class="progress-info">
        <span class="q-num" id="elQNum">Q1</span>
        <span class="q-count" id="elQCount">1 / 12</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="elProgress" style="width:0%"></div>
      </div>
    </div>
    <div class="question-section" id="elQSection">
      <div class="question-text" id="elQText"></div>
      <div class="answers-grid" id="elAnswers"></div>
    </div>
  </div>

let audioCtx = null, soundOn = true;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function toggleSound() {
  soundOn = !soundOn;
  const tog = document.getElementById('soundToggle');
  const tip = document.getElementById('soundTip');
  if (soundOn) { tog.classList.remove('muted'); tip.textContent='효과음 ON'; playSelectSound(); }
  else { tog.classList.add('muted'); tip.textContent='효과음 OFF'; }
}

/* 스트레스 클릭음 */
function playSelectSound() {
  if (!soundOn) return;
  try {
    const ctx = getAudioCtx(), now = ctx.currentTime;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type='sine';
    o.frequency.setValueAtTime(420, now);
    o.frequency.exponentialRampToValueAtTime(280, now+0.08);
    g.gain.setValueAtTime(0.12, now);
    g.gain.exponentialRampToValueAtTime(0.001, now+0.12);
    o.connect(g); g.connect(ctx.destination);
    o.start(now); o.stop(now+0.12);
  } catch(e){}
}

      "당신의 교육 철학을 책이나 블로그로 남기기",
      "새로운 교육 프로젝트나 연구 시작",
      "후배 교사들의 멘토가 되어 선순환 만들기",
      "교육계를 위한 더 큰 역할 고민해보기"
    ]
  }
};

/* ═══════════════════════════════════════
   🎮  Quiz Logic
   ═══════════════════════════════════════ */
let cur = 0;
let totalScore = 0;
let lastRes = null;

function show(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

function beginQuiz() {
  cur = 0;
  totalScore = 0;
  show('screenQuiz');
  renderQ();
}

function renderQ() {
  const d = QS[cur];
  document.getElementById('elQNum').textContent = `Q${cur+1}`;
  document.getElementById('elQCount').textContent = `${cur+1} / 12`;
  document.getElementById('elProgress').style.width = `${(cur/12)*100}%`;

  const sec = document.getElementById('elQSection');
  sec.style.animation='none'; sec.offsetHeight;
  sec.style.animation='fadeSlide 0.45s ease both';

  document.getElementById('elQText').innerHTML = `<span class="q-emoji">${d.e}</span> ${d.q}`;

  const g = document.getElementById('elAnswers');
  g.innerHTML = '';
  d.a.forEach((ans, i) => {
    const b = document.createElement('button');
    b.className = 'answer-btn';
    b.innerHTML = `<span class="num-badge">${String.fromCharCode(65+i)}</span><span>${ans.txt}</span>`;
    b.onclick = () => pick(ans.p, b);
    g.appendChild(b);
  });
}

function pick(points, btn) {
  document.querySelectorAll('.answer-btn').forEach(b=>b.classList.remove('picked'));
  btn.classList.add('picked');
  totalScore += points;
  playSelectSound();

  setTimeout(() => {
    cur++;
    if (cur >= 12) showResult();
    else renderQ();
  }, 380);
}

function showResult() {
  show('screenResult');
  document.getElementById('elProgress').style.width = '100%';

  let result = null;
  if (totalScore >= 70) result = RESULTS.critical;
  else if (totalScore >= 55) result = RESULTS.severe;
  else if (totalScore >= 40) result = RESULTS.moderate;
  else if (totalScore >= 25) result = RESULTS.mild;
  else result = RESULTS.clear;

  lastRes = { result, score: totalScore };

  playMondayHorror();
  spawnConfetti();

  let tipsHTML = '';
  result.tips.forEach(tip => {
    tipsHTML += `<li>${tip}</li>`;
  });

  document.getElementById('elResult').innerHTML = `
    <div class="res-emoji">${result.emoji}</div>
    <div class="res-score">${totalScore}점</div>
    <div class="res-grade ${getGradeClass(totalScore)}">${result.grade}</div>
    <div class="res-title">[ ${result.title} ]</div>
    <div class="res-desc">${result.desc}</div>
    
    <div class="res-tips">
      <h3>💪 월요일 생존 팁</h3>
      <ul>${tipsHTML}</ul>
    </div>
    
    <div class="score-bar">
      <div class="score-bar-label">월요병 심각도</div>
      <div class="score-bar-track">
        <div class="score-bar-fill" id="scoreFill" data-score="${totalScore}点"></div>
      </div>
    </div>
    
    <div class="result-actions">
      <button class="save-btn" id="saveBtn" onclick="saveResult()">결과 저장하기 📸</button>
      <button class="retry-btn" onclick="goHome()">다시 진단하기 🔄</button>
    </div>
  `;

  setTimeout(() => {
    const fill = document.getElementById('scoreFill');
    if (fill) fill.style.width = (totalScore / 72 * 100) + '%';
  }, 350);
}

function getGradeClass(score) {
  if (score >= 70) return 'grade-critical';
  if (score >= 55) return 'grade-severe';
  if (score >= 40) return 'grade-moderate';
  if (score >= 25) return 'grade-mild';
  return 'grade-clear';
}

function goHome() {
  const c = document.querySelector('.confetti-box');
  if(c) c.remove();
  show('screenStart');
}

function spawnConfetti() {
  const old = document.querySelector('.confetti-box');
  if(old) old.remove();
  const box = document.createElement('div');
  box.className = 'confetti-box';
  document.body.appendChild(box);
  const cols = ['#e74c3c','#f39c12','#e67e22','#c0392b','#d35400','#f1c40f','#e74c3c','#e74c3c'];
  for(let i=0;i<60;i++){
    const d = document.createElement('div');
    d.className = 'confetti-dot';
    d.style.left = Math.random()*100+'%';
    d.style.background = cols[Math.floor(Math.random()*cols.length)];
    d.style.width = (Math.random()*8+4)+'px';
    d.style.height = (Math.random()*8+4)+'px';
    d.style.animationDuration = (Math.random()*2.5+2)+'s';
    d.style.animationDelay = (Math.random()*2)+'s';
    box.appendChild(d);
  }
  setTimeout(()=>box.remove(), 6000);
}

/* ═══════════════════════════════════════
   📸  Save Result
   ═══════════════════════════════════════ */
const capBgMap = {
  'critical':'linear-gradient(135deg,#1a2d1f 0%,#2a1a1a 50%,#1a2d1f 100%)',
  'severe':'linear-gradient(135deg,#1a2d1f 0%,#2a2010 50%,#1a2d1f 100%)',
  'moderate':'linear-gradient(135deg,#1a2d1f 0%,#1a2a20 50%,#1a2d1f 100%)',
  'mild':'linear-gradient(135deg,#1a2d1f 0%,#1a2a2a 50%,#1a2d1f 100%)',
  'clear':'linear-gradient(135deg,#1a2d1f 0%,#1a2a2a 50%,#1a2d1f 100%)'
};

function getResultKey(score) {
  if (score >= 70) return 'critical';
  if (score >= 55) return 'severe';
  if (score >= 40) return 'moderate';
  if (score >= 25) return 'mild';
  return 'clear';
}

async function saveResult() {
  if (!lastRes) return;
  const btn = document.getElementById('saveBtn');
  btn.classList.add('saving');
  btn.textContent = '저장 중... ⏳';

  const {result, score} = lastRes;
  const resultKey = getResultKey(score);

  let tipsH = '';
  result.tips.forEach(tip => {
    tipsH += `<li>${tip}</li>`;
  });

  const card = document.createElement('div');
  card.className = 'capture-card';
  card.style.background = capBgMap[resultKey];
  card.innerHTML = `
    <div class="cap-emoji">${result.emoji}</div>
    <div class="cap-score">${score}점</div>
    <div class="cap-grade" style="background: var(--warn-orange); color: #fff;">${result.grade}</div>
    <div class="cap-title">[ ${result.title} ]</div>
    <div class="cap-desc">${result.desc}</div>
    
    <div class="cap-tips">
      <div class="cap-tips-title">💪 월요일 생존 팁</div>
      <ul class="cap-tips-list">${tipsH}</ul>
    </div>
    
    <div class="cap-bar">
      <div class="cap-bar-track">
        <div class="cap-bar-fill" style="width: ${(score/72*100)}%"></div>
      </div>
    </div>
    
    <div class="cap-wm">📚 교사 생존력 테스트 · 12탄 월요병 진단</div>
  `;

  document.body.appendChild(card);

  try {
    await new Promise(res => setTimeout(res, 300));
    const canvas = await html2canvas(card, {
      scale:2, backgroundColor:'#1a2d1f',
      useCORS:true, logging:false,
      width:600, windowWidth:600
    });

    canvas.toBlob(async (blob) => {
      if (navigator.share && navigator.canShare) {
        const file = new File([blob], `월요병진단_${score}점.png`, {type:'image/png'});
        const shareData = {files:[file], title:'월요병 생존 수치 진단', text:`나의 월요병 점수: ${score}점 - ${result.grade}`};
        try {
          if (navigator.canShare(shareData)) {
            await navigator.share(shareData);
            card.remove();
            btn.classList.remove('saving');
            btn.textContent = '결과 저장하기 📸';
            return;
          }
        } catch(e){}
      }

      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `월요병진단_${score}점.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      card.remove();
      btn.classList.remove('saving');
      btn.innerHTML = '저장 완료! ✅';
      setTimeout(()=>{ btn.textContent='결과 저장하기 📸'; }, 2000);
    }, 'image/png');

  } catch(e) {
    console.error('Capture failed:', e);
    card.remove();
    btn.classList.remove('saving');
    btn.textContent = '결과 저장하기 📸';
    alert('이미지 저장에 실패했습니다. 스크린샷을 이용해주세요.');
  }
}
</script>
