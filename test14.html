<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐢 나의 거북목 진화 단계</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --bg-deep: #1a1f2e;
  --bg-mid: #22293a;
  --bg-card: rgba(34,41,58,0.75);
  --glass-border: rgba(241,196,15,0.2);
  --glass-glow: rgba(241,196,15,0.08);
  --warning-yellow: #F1C40F;
  --dark-gray: #2C3E50;
  --danger-red: #E74C3C;
  --success-green: #27AE60;
  --info-blue: #3498DB;
  --light-gray: #ECF0F1;
  --text-white: #eaf0f8;
  --text-dim: rgba(234,240,248,0.5);
  --text-mid: rgba(234,240,248,0.78);
  --radius: 22px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  background: linear-gradient(135deg, var(--dark-gray) 0%, var(--bg-deep) 50%, #0f1419 100%);
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 20px;
  overflow-x: hidden;
}

/* ── Animated Warning Orbs ── */
body::before, body::after {
  content: '';
  position: fixed;
  border-radius: 50%;
  filter: blur(100px);
  z-index: 0;
  pointer-events: none;
}

body::before {
  width: 480px; height: 480px;
  background: var(--warning-yellow);
  opacity: 0.08;
  top: -10%; right: -5%;
  animation: orbWarn 22s ease-in-out infinite;
}

body::after {
  width: 520px; height: 520px;
  background: var(--danger-red);
  opacity: 0.05;
  bottom: -8%; left: -8%;
  animation: orbDanger 26s ease-in-out infinite;
}

@keyframes orbWarn {
  0%,100% { transform:translate(0,0); }
  50% { transform:translate(-10vw, 15vh); }
}

@keyframes orbDanger {
  0%,100% { transform:translate(0,0); }
  50% { transform:translate(12vw, -10vh); }
}

/* Grid BG */
.grid-bg {
  position: fixed; inset:0; z-index:0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(241,196,15,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(241,196,15,0.03) 1px, transparent 1px);
  background-size: 50px 50px;
}

/* ── Sound Toggle ── */
.sound-toggle {
  position: fixed; top:18px; left:18px; z-index:500;
  width:48px; height:48px; border-radius:50%;
  border: 1.5px solid var(--glass-border);
  background: var(--bg-card);
  backdrop-filter: blur(14px);
  box-shadow: 0 0 20px rgba(241,196,15,0.1);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  transition: all 0.3s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.sound-toggle:hover {
  transform: scale(1.1);
  box-shadow: 0 0 28px rgba(241,196,15,0.2);
}

.sound-toggle .icon-on,
.sound-toggle .icon-off {
  position: absolute;
  transition: opacity 0.25s, transform 0.25s;
}

.sound-toggle.muted .icon-on { opacity:0; transform:scale(0.6); }
.sound-toggle.muted .icon-off { opacity:1; transform:scale(1); }
.sound-toggle:not(.muted) .icon-on { opacity:1; transform:scale(1); }
.sound-toggle:not(.muted) .icon-off { opacity:0; transform:scale(0.6); }

.sound-tooltip {
  position: absolute; left:56px; top:50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.8);
  color: var(--warning-yellow);
  font-size: 0.72rem; font-weight:500;
  padding: 5px 10px; border-radius:8px;
  white-space: nowrap;
  opacity:0; pointer-events:none;
  transition: opacity 0.2s;
}

.sound-toggle:hover .sound-tooltip { opacity:1; }

/* ── App ── */
.app-container {
  position: relative; z-index:1;
  width: 100%; max-width: 700px;
  display: flex; flex-direction: column; align-items: center;
  padding: 20px 0 40px;
}

.glass-card {
  background: var(--bg-card);
  backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  box-shadow: 0 8px 40px rgba(0,0,0,0.45), inset 0 1px 0 rgba(241,196,15,0.08);
  padding: 40px 32px;
  width: 100%;
  animation: cardIn 0.6s cubic-bezier(.23,1,.32,1) both;
}

@keyframes cardIn {
  from { opacity:0; transform:translateY(30px) scale(0.97); }
  to { opacity:1; transform:translateY(0) scale(1); }
}

/* ── Start Screen ── */
.start-screen { text-align:center; }

.start-screen .emoji-hero {
  font-size:72px; margin-bottom:14px;
  display:inline-block;
  animation: turtleFloat 2.8s ease-in-out infinite;
}

@keyframes turtleFloat {
  0%,100% { transform:translateY(0) rotate(0deg); }
  50% { transform:translateY(-16px) rotate(-2deg); }
}

.start-screen h1 {
  font-family:'Gaegu',cursive;
  font-size:2.2rem; font-weight:700;
  color: var(--text-white);
  line-height:1.35; margin-bottom:6px;
}

.start-screen h1 span {
  background: linear-gradient(90deg, var(--warning-yellow), var(--danger-red));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.series-tag {
  display:inline-block;
  padding:4px 14px; border-radius:20px;
  background: rgba(241,196,15,0.12);
  border:1px solid rgba(241,196,15,0.3);
  color: var(--warning-yellow);
  font-size:0.75rem; font-weight:700;
  margin-bottom:16px; letter-spacing:0.5px;
}

.start-screen .sub {
  font-size:0.92rem;
  color: var(--text-mid);
  line-height:1.7; margin-bottom:32px;
  word-break: keep-all;
}

.start-btn {
  display:inline-flex; align-items:center; gap:8px;
  padding:16px 52px; border:none; border-radius:50px;
  background: linear-gradient(135deg, var(--warning-yellow), #FFC107);
  color: var(--dark-gray);
  font-family:'Noto Sans KR',sans-serif;
  font-size:1.15rem; font-weight:700;
  cursor:pointer; transition:all 0.3s;
  box-shadow: 0 6px 28px rgba(241,196,15,0.3);
  position:relative; overflow:hidden;
}

.start-btn::after {
  content:''; position:absolute;
  top:-50%; left:-50%; width:200%; height:200%;
  background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.2) 50%, transparent 70%);
  animation: shimmer 3s infinite;
}

@keyframes shimmer {
  0% { transform:translateX(-100%) rotate(25deg); }
  100% { transform:translateX(100%) rotate(25deg); }
}

.start-btn:hover {
  transform:translateY(-3px) scale(1.03);
  box-shadow:0 12px 36px rgba(241,196,15,0.4);
}

/* ── Progress ── */
.progress-wrap { width:100%; margin-bottom:22px; }

.progress-info {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:10px;
}

.progress-info .q-num {
  font-family:'Gaegu',cursive;
  font-size:1.2rem; font-weight:700;
  color: var(--warning-yellow);
}

.progress-info .q-count {
  font-size:0.85rem; color:var(--text-dim); font-weight:500;
}

.progress-bar-bg {
  width:100%; height:10px;
  background: rgba(241,196,15,0.1);
  border-radius:10px; overflow:hidden;
}

.progress-bar-fill {
  height:100%;
  background: linear-gradient(90deg, var(--warning-yellow), var(--danger-red));
  border-radius:10px;
  transition: width 0.5s cubic-bezier(.23,1,.32,1);
}

/* ── Question ── */
.question-section { animation: fadeSlide 0.45s ease both; }

@keyframes fadeSlide {
  from { opacity:0; transform:translateX(36px); }
  to { opacity:1; transform:translateX(0); }
}

.question-text {
  font-size:1.06rem; font-weight:700;
  color: var(--text-white);
  line-height:1.7; margin-bottom:24px;
  word-break:keep-all;
}

.question-text .q-emoji {
  display:inline-block; margin-right:6px; font-size:1.3rem;
}

/* ── Answers ── */
.answers-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:12px;
}

.answer-btn {
  display:flex; align-items:flex-start; gap:10px;
  padding:14px 15px;
  border:1.5px solid rgba(241,196,15,0.12);
  border-radius:16px;
  background:rgba(241,196,15,0.03);
  cursor:pointer; transition:all 0.22s ease;
  text-align:left;
  font-family:'Noto Sans KR',sans-serif;
  font-size:0.84rem; color:var(--text-mid);
  line-height:1.55; word-break:keep-all;
}

.answer-btn .num-badge {
  flex-shrink:0; width:26px; height:26px;
  border-radius:50%;
  background: linear-gradient(135deg, var(--warning-yellow), #FFC107);
  color:var(--dark-gray);
  display:flex; align-items:center; justify-content:center;
  font-size:0.7rem; font-weight:700;
  margin-top:1px;
}

.answer-btn:hover {
  background:rgba(241,196,15,0.12);
  border-color:var(--warning-yellow);
  transform:translateY(-2px);
  box-shadow:0 4px 18px rgba(241,196,15,0.15);
  color:var(--text-white);
}

.answer-btn:active { transform:scale(0.97); }

.answer-btn.picked {
  background:rgba(231,76,60,0.1);
  border-color:var(--danger-red);
  box-shadow:0 0 18px rgba(231,76,60,0.15);
  color:var(--danger-red);
  pointer-events:none;
}

/* ── Result ── */
.result-screen {
  text-align:center;
  animation: popIn 0.65s cubic-bezier(.23,1,.32,1) both;
}

@keyframes popIn {
  from { opacity:0; transform:scale(0.8) translateY(28px); }
  to { opacity:1; transform:scale(1) translateY(0); }
}

.res-emoji {
  font-size:84px; display:inline-block; margin-bottom:12px;
  animation: wobble 1.4s ease-in-out infinite;
}

@keyframes wobble {
  0%,100% { transform:translateY(0) rotate(0deg); }
  25% { transform:translateY(-8px) rotate(-3deg); }
  75% { transform:translateY(-8px) rotate(3deg); }
}

.res-type-badge {
  display:inline-block;
  padding:10px 36px; border-radius:50px;
  font-family:'Gaegu',cursive;
  font-size:1.6rem; font-weight:700;
  margin-bottom:8px;
}

.type-A { background:linear-gradient(135deg, var(--success-green), #229954); color:#fff; }
.type-B { background:linear-gradient(135deg, var(--warning-yellow), #F39C12); color:var(--dark-gray); }
.type-C { background:linear-gradient(135deg, var(--info-blue), #2980B9); color:#fff; }
.type-D { background:linear-gradient(135deg, var(--danger-red), #C0392B); color:#fff; }

.res-title {
  font-family:'Gaegu',cursive;
  font-size:1.3rem; font-weight:700;
  color:var(--warning-yellow); margin-bottom:8px;
}

.res-desc {
  font-size:0.92rem; color:var(--text-mid);
  line-height:1.85; margin-bottom:18px;
  word-break:keep-all; padding:0 6px;
}

.res-angle-display {
  display:flex; justify-content:center; align-items:flex-end;
  gap:8px; margin-bottom:28px; height:140px;
}

.angle-figure {
  position:relative; width:80px; height:120px;
}

.angle-figure svg {
  width:100%; height:100%;
  filter: drop-shadow(0 2px 8px rgba(241,196,15,0.2));
}

.angle-meter {
  position:relative; width:100%; height:16px;
  background:rgba(255,255,255,0.08);
  border-radius:10px; overflow:hidden;
  margin-bottom:8px;
}

.angle-fill {
  height:100%; border-radius:10px;
  transition: width 1.2s cubic-bezier(.23,1,.32,1);
  background: linear-gradient(90deg, var(--success-green), var(--warning-yellow), var(--danger-red));
}

.angle-label {
  font-size:0.75rem; font-weight:700;
  color:var(--text-dim); text-align:center;
}

.res-info-row {
  display:flex; gap:12px; justify-content:center;
  flex-wrap:wrap; margin-bottom:28px;
}

.res-info-box {
  flex:1; min-width:200px; max-width:280px;
  padding:14px 18px; border-radius:16px;
  text-align:left;
}

.res-info-box.stage-box {
  background:rgba(241,196,15,0.1);
  border:1px solid rgba(241,196,15,0.25);
}

.res-info-box.tip-box {
  background:rgba(39,174,96,0.1);
  border:1px solid rgba(39,174,96,0.25);
}

.info-label {
  font-size:0.7rem; font-weight:700;
  letter-spacing:0.5px; margin-bottom:4px;
}

.stage-box .info-label { color:var(--warning-yellow); }
.tip-box .info-label { color:var(--success-green); }

.info-value {
  font-size:0.88rem; font-weight:700;
  color:var(--text-white); line-height:1.5;
}

/* Score Bars */
.score-section {
  margin-bottom:28px; text-align:left;
}

.score-section h3 {
  font-size:0.85rem; font-weight:700;
  color:var(--text-mid); margin-bottom:14px;
  text-align:center;
}

.bar-row {
  display:flex; align-items:center; gap:8px; margin-bottom:8px;
}

.bar-label {
  font-size:0.75rem; font-weight:700;
  color:var(--text-dim); min-width:62px; text-align:right;
}

.bar-track {
  flex:1; height:16px;
  background:rgba(255,255,255,0.05);
  border-radius:10px; overflow:hidden;
}

.bar-fill {
  height:100%; border-radius:10px;
  transition: width 1.1s cubic-bezier(.23,1,.32,1);
  width:0;
}

.bf-A { background:linear-gradient(90deg, var(--success-green), #229954); }
.bf-B { background:linear-gradient(90deg, var(--warning-yellow), #F39C12); }
.bf-C { background:linear-gradient(90deg, var(--info-blue), #2980B9); }
.bf-D { background:linear-gradient(90deg, var(--danger-red), #C0392B); }

.bar-pts {
  font-size:0.78rem; font-weight:700;
  color:var(--text-dim); min-width:28px;
}

/* Stretching Tips */
.stretching-tips {
  background:rgba(39,174,96,0.08);
  border:1px solid rgba(39,174,96,0.2);
  border-radius:16px;
  padding:20px;
  margin-bottom:28px;
}

.tips-title {
  font-size:0.95rem; font-weight:700;
  color:var(--success-green); margin-bottom:14px;
  display:flex; align-items:center; gap:6px;
}

.tips-list {
  display:flex; flex-direction:column; gap:10px;
}

.tip-item {
  font-size:0.84rem; color:var(--text-mid);
  line-height:1.6; word-break:keep-all;
  padding-left:20px; position:relative;
}

.tip-item::before {
  content:'✓'; position:absolute; left:0;
  color:var(--success-green); font-weight:700;
}

/* ── Action Buttons ── */
.result-actions {
  display:flex; gap:12px; justify-content:center; flex-wrap:wrap;
}

.save-btn {
  display:inline-flex; align-items:center; gap:8px;
  padding:15px 36px; border:none; border-radius:50px;
  background:linear-gradient(135deg, var(--warning-yellow), #FFC107);
  color:var(--dark-gray);
  font-family:'Noto Sans KR',sans-serif;
  font-size:1.02rem; font-weight:700;
  cursor:pointer; transition:all 0.3s;
  box-shadow:0 6px 22px rgba(241,196,15,0.3);
}

.save-btn:hover {
  transform:translateY(-3px);
  box-shadow:0 10px 28px rgba(241,196,15,0.45);
}

.save-btn.saving { pointer-events:none; opacity:0.7; }

.retry-btn {
  display:inline-flex; align-items:center; gap:8px;
  padding:15px 36px; border:none; border-radius:50px;
  background:linear-gradient(135deg, var(--info-blue), #2980B9);
  color:#fff;
  font-family:'Noto Sans KR',sans-serif;
  font-size:1.02rem; font-weight:700;
  cursor:pointer; transition:all 0.3s;
  box-shadow:0 6px 22px rgba(52,152,219,0.3);
}

.retry-btn:hover {
  transform:translateY(-3px);
  box-shadow:0 10px 28px rgba(52,152,219,0.4);
}

/* ── Capture Card ── */
.capture-card {
  position:fixed; left:-9999px; top:0;
  width:600px; padding:48px 40px 40px;
  border-radius:28px;
  font-family:'Noto Sans KR',sans-serif;
  text-align:center; z-index:-1;
}

.capture-card .cap-wm {
  font-size:0.68rem; color:rgba(234,240,248,0.35);
  margin-top:18px; letter-spacing:1px;
}

.capture-card .cap-emoji { font-size:68px; margin-bottom:10px; }

.capture-card .cap-badge {
  display:inline-block; padding:8px 30px; border-radius:50px;
  font-family:'Gaegu',cursive;
  font-size:1.5rem; font-weight:700;
  margin-bottom:10px;
}

.capture-card .cap-title {
  font-family:'Gaegu',cursive;
  font-size:1.2rem; font-weight:700;
  color:var(--warning-yellow); margin-bottom:10px;
}

.capture-card .cap-desc {
  font-size:0.84rem; color:rgba(234,240,248,0.78);
  line-height:1.8; word-break:keep-all;
  margin-bottom:16px; padding:0 10px;
}

.capture-card .cap-info-row {
  display:flex; gap:10px; justify-content:center;
  flex-wrap:wrap; margin-bottom:8px;
}

.capture-card .cap-info-box {
  flex:1; min-width:180px; max-width:250px;
  padding:10px 14px; border-radius:12px;
  text-align:left;
}

.capture-card .cap-stage {
  background:rgba(241,196,15,0.12);
  border:1px solid rgba(241,196,15,0.25);
}

.capture-card .cap-tip {
  background:rgba(39,174,96,0.12);
  border:1px solid rgba(39,174,96,0.25);
}

.capture-card .cap-il {
  font-size:0.65rem; font-weight:700;
  margin-bottom:2px; letter-spacing:0.5px;
}

.capture-card .cap-stage .cap-il { color:var(--warning-yellow); }
.capture-card .cap-tip .cap-il { color:var(--success-green); }

.capture-card .cap-iv {
  font-size:0.82rem; font-weight:700;
  color:#fff; line-height:1.5;
}

.capture-card .cap-bars { text-align:left; margin-top:16px; }

.capture-card .cap-br {
  display:flex; align-items:center; gap:6px; margin-bottom:5px;
}

.capture-card .cap-bl {
  font-size:0.68rem; font-weight:700;
  color:rgba(234,240,248,0.45); min-width:56px; text-align:right;
}

.capture-card .cap-bt {
  flex:1; height:12px;
  background:rgba(255,255,255,0.08);
  border-radius:6px; overflow:hidden;
}

.capture-card .cap-bf {
  height:100%; border-radius:6px;
  background:linear-gradient(90deg, var(--warning-yellow), var(--danger-red));
}

.capture-card .cap-bp {
  font-size:0.68rem; font-weight:700;
  color:rgba(234,240,248,0.45); min-width:24px;
}

/* ── Confetti ── */
.confetti-box {
  position:fixed; top:0; left:0;
  width:100%; height:100%;
  pointer-events:none; z-index:999; overflow:hidden;
}

.confetti-dot {
  position:absolute; top:-20px; border-radius:3px;
  animation: fall linear forwards;
}

@keyframes fall {
  0% { transform:translateY(0) rotate(0deg); opacity:1; }
  100% { transform:translateY(110vh) rotate(720deg); opacity:0; }
}

/* ── Deco ── */
.deco {
  position:fixed; font-size:26px; opacity:0.05;
  pointer-events:none; z-index:0;
  animation: decoD 14s ease-in-out infinite;
}

@keyframes decoD {
  0%,100% { transform:translateY(0) rotate(0deg); }
  50% { transform:translateY(-16px) rotate(8deg); }
}

.screen { display:none; }
.screen.on { display:block; }

/* ── Responsive ── */
@media (max-width:640px) {
  body { padding:12px; }
  .glass-card { padding:28px 18px; }
  .start-screen h1 { font-size:1.65rem; }
  .start-screen .emoji-hero { font-size:56px; }
  .question-text { font-size:0.96rem; }
  .answers-grid { grid-template-columns:1fr; gap:10px; }
  .answer-btn { font-size:0.88rem; padding:13px 14px; }
  .res-emoji { font-size:64px; }
  .res-type-badge { font-size:1.3rem; }
  .sound-toggle { width:42px; height:42px; font-size:19px; top:12px; left:12px; }
  .sound-tooltip { display:none; }
  .result-actions { flex-direction:column; align-items:center; }
  .res-info-row { flex-direction:column; align-items:center; }
  .res-info-box { max-width:100%; }
  .res-angle-display { height:100px; }
}
</style>
</head>
<body>

<div class="grid-bg"></div>

<div class="sound-toggle" id="soundToggle" onclick="toggleSound()">
  <span class="icon-on">🔊</span>
  <span class="icon-off">🔇</span>
  <span class="sound-tooltip" id="soundTip">효과음 ON</span>
</div>

<div class="deco" style="top:8%;right:8%;animation-delay:0s;">🏥</div>
<div class="deco" style="top:25%;left:5%;animation-delay:2s;">⚕️</div>
<div class="deco" style="top:55%;right:3%;animation-delay:4s;">💊</div>
<div class="deco" style="top:75%;left:8%;animation-delay:6s;">🦴</div>
<div class="deco" style="top:40%;left:92%;animation-delay:8s;">📋</div>

   🔊  Sound Engine

let audioCtx = null, soundOn = true;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function toggleSound() {
  soundOn = !soundOn;
  const tog = document.getElementById('soundToggle');
  const tip = document.getElementById('soundTip');
  if (soundOn) { tog.classList.remove('muted'); tip.textContent='효과음 ON'; playSelectSound(); }
  else { tog.classList.add('muted'); tip.textContent='효과음 OFF'; }
}

/* 진단 클릭 음향 */
function playSelectSound() {
  if (!soundOn) return;
  try {
    const ctx = getAudioCtx(), now = ctx.currentTime;
    const o1 = ctx.createOscillator(), g1 = ctx.createGain();
    o1.type='sine'; o1.frequency.setValueAtTime(600, now);
    o1.frequency.linearRampToValueAtTime(900, now+0.06);
    g1.gain.setValueAtTime(0.1, now); g1.gain.exponentialRampToValueAtTime(0.001, now+0.1);
    o1.connect(g1); g1.connect(ctx.destination);
    o1.start(now); o1.stop(now+0.1);
  } catch(e){}
}

/* 진단 완료 팡파레 */
function playResultSound() {
  if (!soundOn) return;
  try {
    const ctx = getAudioCtx(), now = ctx.currentTime;
    const notes = [{f:440, s:0, d:0.15}, {f:554, s:0.12, d:0.15}, {f:659, s:0.24, d:0.2}];
    notes.forEach(n => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type='sine'; o.frequency.setValueAtTime(n.f, now+n.s);
      g.gain.setValueAtTime(0.15, now+n.s);
      g.gain.exponentialRampToValueAtTime(0.001, now+n.s+n.d+0.1);
      o.connect(g); g.connect(ctx.destination);
      o.start(now+n.s); o.stop(now+n.s+n.d+0.1);
    });
  } catch(e){}
}

const TYPE_KEYS = ['A','B','C','D'];
const TYPE_NAMES = ['인간대나무','기린지망','명예거북','거북왕'];

   🎮  Quiz Logic
   ═══════════════════════════════════════ */
let cur = 0;
let sc = {A:0,B:0,C:0,D:0};
let lastRes = null;

function show(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

function beginQuiz() {
  cur = 0;
  sc = {A:0,B:0,C:0,D:0};
  show('screenQuiz');
  renderQ();
}

function renderQ() {
  const d = QS[cur];
  document.getElementById('elQNum').textContent = `Q${cur+1}`;
  document.getElementById('elQCount').textContent = `${cur+1} / 12`;
  document.getElementById('elProgress').style.width = `${(cur/12)*100}%`;

  const sec = document.getElementById('elQSection');
  sec.style.animation='none'; sec.offsetHeight;
  sec.style.animation='fadeSlide 0.45s ease both';

  document.getElementById('elQText').innerHTML = `<span class="q-emoji">${d.e}</span> ${d.q}`;

  const g = document.getElementById('elAnswers');
  g.innerHTML = '';
  d.a.forEach((ans, i) => {
    const b = document.createElement('button');
    b.className = 'answer-btn';
    b.innerHTML = `<span class="num-badge">${ans.t}</span><span>${ans.txt}</span>`;
    b.onclick = () => pick(ans.t, b);
    g.appendChild(b);
  });
}

function pick(type, btn) {
  document.querySelectorAll('.answer-btn').forEach(b=>b.classList.remove('picked'));
  btn.classList.add('picked');
  sc[type]++;
  playSelectSound();

  setTimeout(() => {
    cur++;
    if (cur >= 12) showResult();
    else renderQ();
  }, 380);
}

function goHome() {
  const c = document.querySelector('.confetti-box');
  if(c) c.remove();
  show('screenStart');
}

function spawnConfetti() {
  const old = document.querySelector('.confetti-box');
  if(old) old.remove();
  const box = document.createElement('div');
  box.className = 'confetti-box';
  document.body.appendChild(box);
  const cols = ['#F1C40F','#E74C3C','#3498DB','#27AE60','#9B59B6','#F39C12'];
  for(let i=0;i<80;i++){
    const d = document.createElement('div');
    d.className = 'confetti-dot';
    d.style.left = Math.random()*100+'%';
    d.style.background = cols[Math.floor(Math.random()*cols.length)];
    d.style.width = (Math.random()*8+4)+'px';
    d.style.height = (Math.random()*8+4)+'px';
    d.style.animationDuration = (Math.random()*2.5+2)+'s';
    d.style.animationDelay = (Math.random()*2)+'s';
    box.appendChild(d);
  }
  setTimeout(()=>box.remove(), 6000);
}

/* ═══════════════════════════════════════
   📸  Save Result
   ═══════════════════════════════════════ */
const capBgMap = {
  'type-A':'linear-gradient(135deg,#1a1f2e 0%,#0d2744 50%,#1a1f2e 100%)',
  'type-B':'linear-gradient(135deg,#1a1f2e 0%,#2a2000 50%,#1a1f2e 100%)',
  'type-C':'linear-gradient(135deg,#1a1f2e 0%,#0a2a44 50%,#1a1f2e 100%)',
  'type-D':'linear-gradient(135deg,#1a1f2e 0%,#3a1010 50%,#1a1f2e 100%)',
};

const capBadgeBg = {
  'type-A':'linear-gradient(135deg,#27AE60,#229954)',
  'type-B':'linear-gradient(135deg,#F1C40F,#F39C12)',
  'type-C':'linear-gradient(135deg,#3498DB,#2980B9)',
  'type-D':'linear-gradient(135deg,#E74C3C,#C0392B)',
};

const capBadgeCol = {
  'type-A':'#fff',
  'type-B':'#1a1f2e',
  'type-C':'#fff',
  'type-D':'#fff',
};

async function saveResult() {
  if (!lastRes) return;
  const btn = document.getElementById('saveBtn');
  btn.classList.add('saving');
  btn.textContent = '저장 중... ⏳';

  const {r, winner, scores} = lastRes;

  let barsH = '';
  TYPE_KEYS.forEach((k,i) => {
    const pct = (scores[k]/12)*100;
    barsH += `<div class="cap-br">
      <span class="cap-bl">${TYPE_NAMES[i]}</span>
      <div class="cap-bt"><div class="cap-bf" style="width:${pct}%"></div></div>
      <span class="cap-bp">${scores[k]}</span>
    </div>`;
  });

  const card = document.createElement('div');
  card.className = 'capture-card';
  card.style.background = capBgMap[r.cls];
  card.innerHTML = `
    <div class="cap-emoji">${r.emoji}</div>
    <div class="cap-badge" style="background:${capBadgeBg[r.cls]};color:${capBadgeCol[r.cls]}">${r.label}</div>
    <div class="cap-title">[ ${r.title} ]</div>
    <div class="cap-desc">${r.desc}</div>
    <div class="cap-info-row">
      <div class="cap-info-box cap-stage">
        <div class="cap-il">📊 현재 단계</div>
        <div class="cap-iv">${r.stage}</div>
      </div>
      <div class="cap-info-box cap-tip">
        <div class="cap-il">💚 추천 조치</div>
        <div class="cap-iv">${r.tips[0]}</div>
      </div>
    </div>
    <div class="cap-bars">${barsH}</div>
    <div class="cap-wm">🐢 나의 거북목 진화 단계 · 교사 생존력 테스트 14탄</div>
  `;

  document.body.appendChild(card);

  try {
    await new Promise(res => setTimeout(res, 300));
    const canvas = await html2canvas(card, {
      scale:2, backgroundColor:'#1a1f2e',
      useCORS:true, logging:false,
      width:600, windowWidth:600
    });

    canvas.toBlob(async (blob) => {
      if (navigator.share && navigator.canShare) {
        const file = new File([blob], `거북목진화_${r.label}.png`, {type:'image/png'});
        const shareData = {files:[file], title:'나의 거북목 진화 단계', text:`나는 ${r.stage}! - ${r.title}`};
        try {
          if (navigator.canShare(shareData)) {
            await navigator.share(shareData);
            card.remove();
            btn.classList.remove('saving');
            btn.textContent = '진단 결과 저장 📸';
            return;
          }
        } catch(e){}
      }

      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `거북목진화_${r.label}.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      card.remove();
      btn.classList.remove('saving');
      btn.innerHTML = '저장 완료! ✅';
      setTimeout(()=>{ btn.textContent='진단 결과 저장 📸'; }, 2000);
    }, 'image/png');

  } catch(e) {
    console.error('Capture failed:', e);
    card.remove();
    btn.classList.remove('saving');
    btn.textContent = '진단 결과 저장 📸';
    alert('이미지 저장에 실패했습니다. 스크린샷을 이용해주세요.');
  }
}
</script>
