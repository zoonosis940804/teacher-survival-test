<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛡️ 나의 교실 속 빌런 대응 레벨</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --bg-deep: #1a1a2e;
  --bg-card: #16213e;
  --glass-bg: rgba(22,33,62,0.65);
  --glass-border: rgba(0,245,212,0.2);
  --glass-glow: rgba(0,245,212,0.08);
  --mint: #00f5d4;
  --orange: #ff9f1c;
  --pink: #ff6b9d;
  --text-white: #f0f0f0;
  --text-dim: rgba(240,240,240,0.6);
  --text-mid: rgba(240,240,240,0.8);
  --radius: 22px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  background: var(--bg-deep);
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 20px;
  overflow-x: hidden;
}

/* ── Animated BG ── */
body::before, body::after {
  content: '';
  position: fixed;
  border-radius: 50%;
  filter: blur(100px);
  z-index: 0;
  pointer-events: none;
  opacity: 0.18;
}

body::before {
  width: 500px; height: 500px;
  background: var(--mint);
  top: -10%; left: -10%;
  animation: orbA 18s ease-in-out infinite;
}

body::after {
  width: 450px; height: 450px;
  background: var(--orange);
  bottom: -10%; right: -10%;
  animation: orbB 22s ease-in-out infinite;
}

@keyframes orbA {
  0%,100% { transform: translate(0,0); }
  33% { transform: translate(15vw, 20vh); }
  66% { transform: translate(5vw, 10vh); }
}
@keyframes orbB {
  0%,100% { transform: translate(0,0); }
  33% { transform: translate(-10vw, -15vh); }
  66% { transform: translate(-20vw, -5vh); }
}

/* Grid dots pattern */
.grid-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background-image: radial-gradient(rgba(0,245,212,0.06) 1px, transparent 1px);
  background-size: 32px 32px;
}

/* ── Sound Toggle ── */
.sound-toggle {
  position: fixed;
  top: 18px; left: 18px;
  z-index: 500;
  width: 48px; height: 48px;
  border-radius: 50%;
  border: 1.5px solid var(--glass-border);
  background: var(--glass-bg);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  box-shadow: 0 0 20px rgba(0,245,212,0.1);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  transition: all 0.3s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.sound-toggle:hover {
  transform: scale(1.1);
  box-shadow: 0 0 28px rgba(0,245,212,0.2);
}

.sound-toggle .icon-on,
.sound-toggle .icon-off {
  position: absolute;
  transition: opacity 0.25s, transform 0.25s;
}

.sound-toggle.muted .icon-on { opacity:0; transform:scale(0.6); }
.sound-toggle.muted .icon-off { opacity:1; transform:scale(1); }
.sound-toggle:not(.muted) .icon-on { opacity:1; transform:scale(1); }
.sound-toggle:not(.muted) .icon-off { opacity:0; transform:scale(0.6); }

.sound-tooltip {
  position: absolute;
  left: 56px; top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.75);
  color: var(--mint);
  font-size: 0.72rem;
  font-weight: 500;
  padding: 5px 10px;
  border-radius: 8px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

.sound-toggle:hover .sound-tooltip { opacity:1; }

/* ── App ── */
.app-container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 700px;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 0 40px;
}

.glass-card {
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(0,245,212,0.08);
  padding: 40px 32px;
  width: 100%;
  animation: cardIn 0.6s cubic-bezier(.23,1,.32,1) both;
}

@keyframes cardIn {
  from { opacity:0; transform:translateY(30px) scale(0.97); }
  to { opacity:1; transform:translateY(0) scale(1); }
}

/* ── Start ── */
.start-screen { text-align: center; }

.start-screen .emoji-hero {
  font-size: 72px;
  margin-bottom: 14px;
  display: inline-block;
  animation: heroFloat 2.5s ease-in-out infinite;
}

@keyframes heroFloat {
  0%,100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-14px) rotate(3deg); }
}

.start-screen h1 {
  font-family: 'Gaegu', cursive;
  font-size: 2.2rem;
  font-weight: 700;
  color: var(--mint);
  line-height: 1.35;
  margin-bottom: 6px;
}

.start-screen .series-tag {
  display: inline-block;
  padding: 4px 14px;
  border-radius: 20px;
  background: rgba(255,159,28,0.15);
  border: 1px solid rgba(255,159,28,0.3);
  color: var(--orange);
  font-size: 0.75rem;
  font-weight: 700;
  margin-bottom: 16px;
  letter-spacing: 0.5px;
}

.start-screen .sub {
  font-size: 0.92rem;
  color: var(--text-mid);
  line-height: 1.7;
  margin-bottom: 32px;
}

.start-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 16px 52px;
  border: none;
  border-radius: 50px;
  background: linear-gradient(135deg, var(--mint), #00c9a7);
  color: var(--bg-deep);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 1.15rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 6px 28px rgba(0,245,212,0.3);
  position: relative;
  overflow: hidden;
}

.start-btn::after {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.15) 50%, transparent 70%);
  animation: shimmer 3s infinite;
}

@keyframes shimmer {
  0% { transform: translateX(-100%) rotate(25deg); }
  100% { transform: translateX(100%) rotate(25deg); }
}

.start-btn:hover {
  transform: translateY(-3px) scale(1.03);
  box-shadow: 0 12px 36px rgba(0,245,212,0.4);
}

/* ── Progress ── */
.progress-wrap { width:100%; margin-bottom:22px; }

.progress-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.progress-info .q-num {
  font-family: 'Gaegu', cursive;
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--mint);
}

.progress-info .q-count {
  font-size: 0.85rem;
  color: var(--text-dim);
  font-weight: 500;
}

.progress-bar-bg {
  width: 100%; height: 10px;
  background: rgba(255,255,255,0.08);
  border-radius: 10px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--mint), var(--orange));
  border-radius: 10px;
  transition: width 0.5s cubic-bezier(.23,1,.32,1);
}

/* ── Question ── */
.question-section { animation: fadeSlide 0.45s ease both; }

@keyframes fadeSlide {
  from { opacity:0; transform:translateX(36px); }
  to { opacity:1; transform:translateX(0); }
}

.question-text {
  font-size: 1.06rem;
  font-weight: 700;
  color: var(--text-white);
  line-height: 1.7;
  margin-bottom: 24px;
  word-break: keep-all;
}

.question-text .q-emoji {
  display: inline-block;
  margin-right: 6px;
  font-size: 1.3rem;
}

/* ── Answers ── */
.answers-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.answer-btn {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 14px 15px;
  border: 1.5px solid rgba(0,245,212,0.12);
  border-radius: 16px;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(6px);
  cursor: pointer;
  transition: all 0.22s ease;
  text-align: left;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 0.84rem;
  color: var(--text-mid);
  line-height: 1.55;
  word-break: keep-all;
}

.answer-btn .num-badge {
  flex-shrink: 0;
  width: 26px; height: 26px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--mint), var(--orange));
  color: var(--bg-deep);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.72rem;
  font-weight: 700;
  margin-top: 1px;
}

.answer-btn:hover {
  background: rgba(0,245,212,0.08);
  border-color: var(--mint);
  transform: translateY(-2px);
  box-shadow: 0 4px 18px rgba(0,245,212,0.12);
  color: var(--text-white);
}

.answer-btn:active { transform: scale(0.97); }

.answer-btn.picked {
  background: rgba(0,245,212,0.12);
  border-color: var(--mint);
  box-shadow: 0 0 20px rgba(0,245,212,0.15);
  color: var(--mint);
  pointer-events: none;
}

/* ── Result ── */
.result-screen {
  text-align: center;
  animation: popIn 0.65s cubic-bezier(.23,1,.32,1) both;
}

@keyframes popIn {
  from { opacity:0; transform:scale(0.8) translateY(28px); }
  to { opacity:1; transform:scale(1) translateY(0); }
}

.res-emoji {
  font-size: 84px;
  display: inline-block;
  margin-bottom: 12px;
  animation: emojiDance 1.2s ease-in-out infinite;
}

@keyframes emojiDance {
  0%,100% { transform:scale(1) rotate(0deg); }
  25% { transform:scale(1.12) rotate(-6deg); }
  75% { transform:scale(1.12) rotate(6deg); }
}

.res-tier-badge {
  display: inline-block;
  padding: 10px 36px;
  border-radius: 50px;
  font-family: 'Gaegu', cursive;
  font-size: 1.7rem;
  font-weight: 700;
  margin-bottom: 8px;
}

.tier-S { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #1a1a2e; }
.tier-A { background: linear-gradient(135deg, var(--mint), #00c9a7); color: #1a1a2e; }
.tier-B { background: linear-gradient(135deg, #74b9ff, #a29bfe); color: #fff; }
.tier-C { background: linear-gradient(135deg, var(--orange), #fdcb6e); color: #1a1a2e; }
.tier-D { background: linear-gradient(135deg, var(--pink), #e17055); color: #fff; }
.tier-F { background: linear-gradient(135deg, #636e72, #2d3436); color: #dfe6e9; }

.res-title {
  font-family: 'Gaegu', cursive;
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--mint);
  margin-bottom: 6px;
}

.res-score-label {
  font-size: 0.82rem;
  color: var(--text-dim);
  margin-bottom: 16px;
}

.res-desc {
  font-size: 0.92rem;
  color: var(--text-mid);
  line-height: 1.85;
  margin-bottom: 18px;
  word-break: keep-all;
  padding: 0 6px;
}

.res-item-box {
  display: inline-block;
  padding: 12px 24px;
  border-radius: 16px;
  background: rgba(255,159,28,0.1);
  border: 1px solid rgba(255,159,28,0.25);
  margin-bottom: 28px;
}

.res-item-box .item-label {
  font-size: 0.72rem;
  color: var(--orange);
  font-weight: 700;
  margin-bottom: 4px;
  letter-spacing: 0.5px;
}

.res-item-box .item-name {
  font-size: 0.95rem;
  color: var(--text-white);
  font-weight: 700;
}

/* Score Bars */
.score-section {
  margin-bottom: 28px;
  text-align: left;
}

.score-section h3 {
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--text-mid);
  margin-bottom: 14px;
  text-align: center;
}

.score-meter {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}

.meter-label {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--text-dim);
  min-width: 28px;
  text-align: right;
}

.meter-track {
  flex: 1;
  height: 18px;
  background: rgba(255,255,255,0.06);
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}

.meter-fill {
  height: 100%;
  border-radius: 10px;
  transition: width 1.2s cubic-bezier(.23,1,.32,1);
  width: 0;
  background: linear-gradient(90deg, var(--mint), var(--orange));
}

.meter-pts {
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--text-dim);
  min-width: 36px;
}

/* ── Action Buttons ── */
.result-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

.save-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 15px 36px;
  border: none;
  border-radius: 50px;
  background: linear-gradient(135deg, var(--orange), #e17055);
  color: #fff;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 1.02rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 6px 22px rgba(255,159,28,0.3);
}

.save-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 28px rgba(255,159,28,0.45);
}

.save-btn.saving { pointer-events:none; opacity:0.7; }

.retry-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 15px 36px;
  border: none;
  border-radius: 50px;
  background: linear-gradient(135deg, var(--mint), #00c9a7);
  color: var(--bg-deep);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 1.02rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 6px 22px rgba(0,245,212,0.3);
}

.retry-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 28px rgba(0,245,212,0.4);
}

/* ── Capture Card ── */
.capture-card {
  position: fixed;
  left: -9999px; top: 0;
  width: 600px;
  padding: 48px 40px 40px;
  border-radius: 28px;
  font-family: 'Noto Sans KR', sans-serif;
  text-align: center;
  z-index: -1;
}

.capture-card .cap-watermark {
  font-size: 0.7rem;
  color: rgba(255,255,255,0.45);
  margin-top: 18px;
  letter-spacing: 1px;
}

.capture-card .cap-emoji { font-size: 68px; margin-bottom: 10px; }

.capture-card .cap-tier {
  display: inline-block;
  padding: 8px 30px;
  border-radius: 50px;
  font-family: 'Gaegu', cursive;
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 10px;
}

.capture-card .cap-title {
  font-family: 'Gaegu', cursive;
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--mint);
  margin-bottom: 6px;
}

.capture-card .cap-score-label {
  font-size: 0.78rem;
  color: rgba(255,255,255,0.5);
  margin-bottom: 14px;
}

.capture-card .cap-desc {
  font-size: 0.85rem;
  color: rgba(255,255,255,0.8);
  line-height: 1.8;
  word-break: keep-all;
  margin-bottom: 16px;
  padding: 0 10px;
}

.capture-card .cap-item {
  display: inline-block;
  padding: 10px 22px;
  border-radius: 14px;
  background: rgba(255,159,28,0.18);
  border: 1px solid rgba(255,159,28,0.3);
}

.capture-card .cap-item-label {
  font-size: 0.68rem;
  color: var(--orange);
  font-weight: 700;
  margin-bottom: 3px;
}

.capture-card .cap-item-name {
  font-size: 0.88rem;
  color: #fff;
  font-weight: 700;
}

.capture-card .cap-meter {
  margin-top: 18px;
  text-align: left;
}

.capture-card .cap-meter-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 5px;
}

.capture-card .cap-meter-track {
  flex: 1;
  height: 12px;
  background: rgba(255,255,255,0.1);
  border-radius: 6px;
  overflow: hidden;
}

.capture-card .cap-meter-fill {
  height: 100%;
  border-radius: 6px;
  background: linear-gradient(90deg, var(--mint), var(--orange));
}

.capture-card .cap-m-label {
  font-size: 0.7rem;
  font-weight: 700;
  color: rgba(255,255,255,0.5);
  min-width: 48px;
  text-align: right;
}

.capture-card .cap-m-pts {
  font-size: 0.7rem;
  font-weight: 700;
  color: rgba(255,255,255,0.5);
  min-width: 30px;
}

/* ── Confetti ── */
.confetti-box {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  pointer-events: none;
  z-index: 999;
  overflow: hidden;
}

.confetti-dot {
  position: absolute;
  top: -20px;
  border-radius: 3px;
  animation: fall linear forwards;
}

@keyframes fall {
  0% { transform:translateY(0) rotate(0deg); opacity:1; }
  100% { transform:translateY(110vh) rotate(720deg); opacity:0; }
}

/* ── Deco ── */
.deco {
  position: fixed;
  font-size: 28px;
  opacity: 0.08;
  pointer-events: none;
  z-index: 0;
  animation: decoD 14s ease-in-out infinite;
}

@keyframes decoD {
  0%,100% { transform:translateY(0) rotate(0deg); }
  50% { transform:translateY(-18px) rotate(8deg); }
}

.screen { display:none; }
.screen.on { display:block; }

/* ── Responsive ── */
@media (max-width:640px) {
  body { padding:12px; }
  .glass-card { padding:28px 18px; }
  .start-screen h1 { font-size:1.7rem; }
  .start-screen .emoji-hero { font-size:56px; }
  .question-text { font-size:0.96rem; }
  .answers-grid { grid-template-columns:1fr; gap:10px; }
  .answer-btn { font-size:0.88rem; padding:13px 14px; }
  .res-emoji { font-size:64px; }
  .res-tier-badge { font-size:1.35rem; }
  .sound-toggle { width:42px; height:42px; font-size:19px; top:12px; left:12px; }
  .sound-tooltip { display:none; }
  .result-actions { flex-direction: column; align-items: center; }
}
</style>
</head>
<body>

<div class="grid-bg"></div>

<!-- Sound Toggle -->
<div class="sound-toggle" id="soundToggle" onclick="toggleSound()">
  <span class="icon-on">🔊</span>
  <span class="icon-off">🔇</span>
  <span class="sound-tooltip" id="soundTip">효과음 ON</span>
</div>

<!-- Decorations -->
<div class="deco" style="top:6%;left:5%;animation-delay:0s;">🛡️</div>
<div class="deco" style="top:22%;right:7%;animation-delay:2s;">💥</div>
<div class="deco" style="top:50%;left:3%;animation-delay:4s;">🧘</div>
<div class="deco" style="top:72%;right:5%;animation-delay:6s;">🔥</div>
<div class="deco" style="top:40%;left:91%;animation-delay:8s;">⚡</div>
<div class="deco" style="top:88%;left:12%;animation-delay:3s;">😤</div>

<div class="app-container">

  <!-- START -->
  <div class="glass-card screen on" id="screenStart">
    <div class="start-screen">
      <div class="emoji-hero">🛡️</div>
      <h1>나의 교실 속<br>빌런 대응 레벨</h1>
      <div class="series-tag">시리즈 2탄 · 멘탈 티어 테스트</div>
      <p class="sub">교실에서 벌어지는 12가지 빌런 상황!<br>당신의 대처법으로 멘탈 티어를 측정합니다.<br>⚡ S티어부터 F티어까지, 당신은 어디? ⚡</p>
      <button class="start-btn" onclick="beginQuiz()">측정 시작하기 🔬</button>
    </div>
  </div>

  <!-- QUIZ -->
  <div class="glass-card screen" id="screenQuiz">
    <div class="progress-wrap">
      <div class="progress-info">
        <span class="q-num" id="elQNum">Q1</span>
        <span class="q-count" id="elQCount">1 / 12</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="elProgress" style="width:0%"></div>
      </div>
    </div>
    <div class="question-section" id="elQSection">
      <div class="question-text" id="elQText"></div>
      <div class="answers-grid" id="elAnswers"></div>
    </div>
  </div>

  <!-- RESULT -->
  <div class="glass-card screen" id="screenResult">
    <div class="result-screen" id="elResult"></div>
  </div>

</div>

<script>
/* ═══════════════════════════════════════

   ═══════════════════════════════════════ */
let audioCtx = null;
let soundOn = true;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function toggleSound() {
  soundOn = !soundOn;
  const tog = document.getElementById('soundToggle');
  const tip = document.getElementById('soundTip');
  if (soundOn) {
    tog.classList.remove('muted');
    tip.textContent = '효과음 ON';
    playSelectSound();
  } else {
    tog.classList.add('muted');
    tip.textContent = '효과음 OFF';
  }
}

function playSelectSound() {
  if (!soundOn) return;
  try {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(660, now);
    osc.frequency.exponentialRampToValueAtTime(1200, now + 0.07);
    osc.frequency.exponentialRampToValueAtTime(980, now + 0.14);
    g.gain.setValueAtTime(0.16, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(now); osc.stop(now + 0.2);

    const o2 = ctx.createOscillator();
    const g2 = ctx.createGain();
    o2.type = 'sine';
    o2.frequency.setValueAtTime(1600, now + 0.02);
    o2.frequency.exponentialRampToValueAtTime(2400, now + 0.1);
    g2.gain.setValueAtTime(0.06, now + 0.02);
    g2.gain.exponentialRampToValueAtTime(0.001, now + 0.16);
    o2.connect(g2); g2.connect(ctx.destination);
    o2.start(now + 0.02); o2.stop(now + 0.16);
  } catch(e) {}
}

function playResultSound() {
  if (!soundOn) return;
  try {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;
    const notes = [
      {f:440, s:0, d:0.14},
      {f:554, s:0.11, d:0.14},
      {f:659, s:0.22, d:0.14},
      {f:880, s:0.35, d:0.35}
    ];
    notes.forEach(n => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'triangle';
      o.frequency.setValueAtTime(n.f, now+n.s);
      g.gain.setValueAtTime(0, now+n.s);
      g.gain.linearRampToValueAtTime(0.2, now+n.s+0.02);
      g.gain.setValueAtTime(0.2, now+n.s+n.d*0.6);
      g.gain.exponentialRampToValueAtTime(0.001, now+n.s+n.d+0.15);
      o.connect(g); g.connect(ctx.destination);
      o.start(now+n.s); o.stop(now+n.s+n.d+0.15);
      const o2 = ctx.createOscillator();
      const g3 = ctx.createGain();
      o2.type = 'sine';
      o2.frequency.setValueAtTime(n.f*2, now+n.s);
      g3.gain.setValueAtTime(0, now+n.s);
      g3.gain.linearRampToValueAtTime(0.05, now+n.s+0.02);
      g3.gain.exponentialRampToValueAtTime(0.001, now+n.s+n.d+0.1);
      o2.connect(g3); g3.connect(ctx.destination);
      o2.start(now+n.s); o2.stop(now+n.s+n.d+0.1);
    });
    const sw = ctx.createOscillator();
    const sg = ctx.createGain();
    sw.type = 'sine';
    sw.frequency.setValueAtTime(1800, now+0.55);
    sw.frequency.exponentialRampToValueAtTime(3600, now+0.75);
    sw.frequency.exponentialRampToValueAtTime(2800, now+0.95);
    sg.gain.setValueAtTime(0, now+0.55);
    sg.gain.linearRampToValueAtTime(0.04, now+0.6);
    sg.gain.exponentialRampToValueAtTime(0.001, now+1.0);
    sw.connect(sg); sg.connect(ctx.destination);
    sw.start(now+0.55); sw.stop(now+1.0);
  } catch(e) {}
}

  g.innerHTML = '';
  d.a.forEach((t, i) => {
    const b = document.createElement('button');
    b.className = 'answer-btn';
    b.innerHTML = `<span class="num-badge">${i+1}</span><span>${t}</span>`;
    b.onclick = () => pick(i, b);
    g.appendChild(b);
  });
}

function pick(idx, btn) {
  document.querySelectorAll('.answer-btn').forEach(b => b.classList.remove('picked'));
  btn.classList.add('picked');
  totalScore += PTS[idx];
  playSelectSound();

  setTimeout(() => {
    cur++;
    if (cur >= 12) showResult();
    else renderQ();
  }, 380);
}

function showResult() {
  show('screenResult');
  document.getElementById('elProgress').style.width = '100%';

  const t = getTier(totalScore);
  lastResultData = { t, totalScore };

  spawnConfetti();
  playResultSound();

  // Score meter
  const pct = (totalScore / 72) * 100;

  document.getElementById('elResult').innerHTML = `
    <div class="res-emoji">${t.emoji}</div>
    <div class="res-tier-badge ${t.cls}">${t.tier} 티어</div>
    <div class="res-title">[ ${t.title} ]</div>
    <div class="res-score-label">총점: ${totalScore} / 72점</div>
    <div class="res-desc">${t.desc}</div>
    <div class="res-item-box">
      <div class="item-label">🎁 추천 아이템</div>
      <div class="item-name">${t.item}</div>
    </div>
    <div class="score-section">
      <h3>⚡ 멘탈 게이지</h3>
      <div class="score-meter">
        <span class="meter-label">0</span>
        <div class="meter-track">
          <div class="meter-fill" id="meterFill" data-w="${pct}"></div>
        </div>
        <span class="meter-pts">${totalScore}점</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:0 36px;margin-top:2px;">
        <span style="font-size:0.65rem;color:var(--text-dim);">F</span>
        <span style="font-size:0.65rem;color:var(--text-dim);">D</span>
        <span style="font-size:0.65rem;color:var(--text-dim);">C</span>
        <span style="font-size:0.65rem;color:var(--text-dim);">B</span>
        <span style="font-size:0.65rem;color:var(--text-dim);">A</span>
        <span style="font-size:0.65rem;color:var(--text-dim);">S</span>
      </div>
    </div>
    <div class="result-actions">
      <button class="save-btn" id="saveBtn" onclick="saveResult()">내 결과 저장하기 📸</button>
      <button class="retry-btn" onclick="goHome()">다시 측정하기 🔄</button>
    </div>
  `;

  setTimeout(() => {
    const m = document.getElementById('meterFill');
    if (m) m.style.width = m.dataset.w + '%';
  }, 350);
}

function goHome() {
  const c = document.querySelector('.confetti-box');
  if (c) c.remove();
  show('screenStart');
}

function spawnConfetti() {
  const old = document.querySelector('.confetti-box');
  if (old) old.remove();
  const box = document.createElement('div');
  box.className = 'confetti-box';
  document.body.appendChild(box);
  const cols = ['#00f5d4','#ff9f1c','#ff6b9d','#ffd700','#74b9ff','#a29bfe','#55efc4','#fdcb6e','#00c9a7','#e17055'];
  for (let i = 0; i < 90; i++) {
    const d = document.createElement('div');
    d.className = 'confetti-dot';
    d.style.left = Math.random()*100+'%';
    d.style.background = cols[Math.floor(Math.random()*cols.length)];
    d.style.width = (Math.random()*9+5)+'px';
    d.style.height = (Math.random()*9+5)+'px';
    d.style.animationDuration = (Math.random()*2.5+2)+'s';
    d.style.animationDelay = (Math.random()*2)+'s';
    d.style.borderRadius = Math.random()>0.5?'50%':'3px';
    box.appendChild(d);
  }
  setTimeout(()=>box.remove(), 6000);
}

/* ═══════════════════════════════════════
   📸  Save Result as Image
   ═══════════════════════════════════════ */
const tierBgMap = {
  'tier-S': 'linear-gradient(135deg, #1a1a2e 0%, #2d1b4e 50%, #1a1a2e 100%)',
  'tier-A': 'linear-gradient(135deg, #1a1a2e 0%, #0d3b36 50%, #1a1a2e 100%)',
  'tier-B': 'linear-gradient(135deg, #1a1a2e 0%, #1b2d4e 50%, #1a1a2e 100%)',
  'tier-C': 'linear-gradient(135deg, #1a1a2e 0%, #3b2d0d 50%, #1a1a2e 100%)',
  'tier-D': 'linear-gradient(135deg, #1a1a2e 0%, #3b1520 50%, #1a1a2e 100%)',
  'tier-F': 'linear-gradient(135deg, #1a1a2e 0%, #2d2d2d 50%, #1a1a2e 100%)',
};

const tierBadgeBg = {
  'tier-S': 'linear-gradient(135deg, #ffd700, #ffaa00)',
  'tier-A': 'linear-gradient(135deg, #00f5d4, #00c9a7)',
  'tier-B': 'linear-gradient(135deg, #74b9ff, #a29bfe)',
  'tier-C': 'linear-gradient(135deg, #ff9f1c, #fdcb6e)',
  'tier-D': 'linear-gradient(135deg, #ff6b9d, #e17055)',
  'tier-F': 'linear-gradient(135deg, #636e72, #2d3436)',
};

const tierBadgeColor = {
  'tier-S': '#1a1a2e', 'tier-A': '#1a1a2e', 'tier-B': '#fff',
  'tier-C': '#1a1a2e', 'tier-D': '#fff', 'tier-F': '#dfe6e9',
};

async function saveResult() {
  if (!lastResultData) return;
  const btn = document.getElementById('saveBtn');
  btn.classList.add('saving');
  btn.textContent = '저장 중... ⏳';

  const { t, totalScore: ts } = lastResultData;
  const pct = (ts / 72) * 100;

  const card = document.createElement('div');
  card.className = 'capture-card';
  card.style.background = tierBgMap[t.cls];

  card.innerHTML = `
    <div class="cap-emoji">${t.emoji}</div>
    <div class="cap-tier" style="background:${tierBadgeBg[t.cls]};color:${tierBadgeColor[t.cls]}">${t.tier} 티어</div>
    <div class="cap-title">[ ${t.title} ]</div>
    <div class="cap-score-label">총점: ${ts} / 72점</div>
    <div class="cap-desc">${t.desc}</div>
    <div class="cap-item">
      <div class="cap-item-label">🎁 추천 아이템</div>
      <div class="cap-item-name">${t.item}</div>
    </div>
    <div class="cap-meter">
      <div class="cap-meter-row">
        <span class="cap-m-label">멘탈</span>
        <div class="cap-meter-track">
          <div class="cap-meter-fill" style="width:${pct}%"></div>
        </div>
        <span class="cap-m-pts">${ts}점</span>
      </div>
    </div>
    <div class="cap-watermark">🛡️ 나의 교실 속 빌런 대응 레벨 · 시리즈 2탄</div>
  `;

  document.body.appendChild(card);

  try {
    await new Promise(res => setTimeout(res, 300));
    const canvas = await html2canvas(card, {
      scale: 2, backgroundColor: '#1a1a2e',
      useCORS: true, logging: false,
      width: 600, windowWidth: 600
    });

    canvas.toBlob(async (blob) => {
      if (navigator.share && navigator.canShare) {
        const file = new File([blob], `멘탈티어_${t.tier}티어.png`, { type:'image/png' });
        const shareData = { files:[file], title:'나의 교실 속 빌런 대응 레벨', text:`나의 멘탈 티어는 ${t.tier}티어! - ${t.title}` };
        try {
          if (navigator.canShare(shareData)) {
            await navigator.share(shareData);
            card.remove();
            btn.classList.remove('saving');
            btn.textContent = '내 결과 저장하기 📸';
            return;
          }
        } catch(e) {}
      }

      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `멘탈티어_${t.tier}티어.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      card.remove();
      btn.classList.remove('saving');
      btn.innerHTML = '저장 완료! ✅';
      setTimeout(() => { btn.textContent = '내 결과 저장하기 📸'; }, 2000);
    }, 'image/png');

  } catch(e) {
    console.error('Capture failed:', e);
    card.remove();
    btn.classList.remove('saving');
    btn.textContent = '내 결과 저장하기 📸';
    alert('이미지 저장에 실패했습니다. 스크린샷을 이용해주세요.');
  }
}
</script>
